name: PC Client CI

on:
  pull_request:
    paths:
      - ".github/workflows/pc-client-ci.yml"
      - "lpp/lpp_pc_client/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/pc-client-ci.yml"
      - "lpp/lpp_pc_client/**"

jobs:
  quick:
    name: Typecheck, Core Tests, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lpp/lpp_pc_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lpp/lpp_pc_client/package-lock.json
      - name: Install
        run: npm ci
      - name: Quick Check
        run: npm run check:quick
      - name: Core Unit Tests
        run: npm run test:core
      - name: Production Build
        run: npm run build

  browser:
    name: Browser Smoke
    runs-on: ubuntu-latest
    needs: quick
    defaults:
      run:
        working-directory: lpp/lpp_pc_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lpp/lpp_pc_client/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium
      - name: Browser Tests
        run: npm run test:browser
