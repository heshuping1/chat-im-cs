<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>智能客服系统 · 顶级增强交付版 v3.0</title>
<style>
/* ========== Design Tokens ========== */
:root{
  --brand:#5b21b6; --brand2:#7c3aed; --brand3:#a855f7;
  --blue:#2563eb; --blue-soft:#dbeafe;
  --green:#16a34a; --green-soft:#dcfce7;
  --amber:#d97706; --amber-soft:#fef3c7;
  --red:#dc2626; --red-soft:#fee2e2;
  --pink:#db2777; --pink-soft:#fce7f3;
  --bg:#f5f7fb; --card:#ffffff; --line:#e5e7eb;
  --t1:#0f172a; --t2:#334155; --t3:#64748b; --t4:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 6px 16px rgba(15,23,42,.04);
  --shadow-lg:0 8px 30px rgba(15,23,42,.10);
  --radius:14px; --radius-sm:10px;
  --sb:240px; --hd:60px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ========== Layout ========== */
.app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,#1e1b4b 0%,#312e81 60%,#4338ca 100%);color:#fff;position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
.brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#a855f7,#22d3ee);display:grid;place-items:center;font-size:18px;box-shadow:0 4px 12px rgba(168,85,247,.4)}
.brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.5px}
.brand p{font-size:11px;margin:0;color:#c7d2fe;opacity:.85}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#e0e7ff;font-size:13.5px;font-weight:500;position:relative;cursor:pointer;transition:all .15s}
.nav-item .ico{width:18px;text-align:center;font-size:16px}
.nav-item .label{flex:1}
.nav-item .badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:9px;min-width:18px;text-align:center}
.nav-item .badge.new{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.nav-item.soon{background:rgba(168,85,247,.18);color:#e9d5ff}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;background:linear-gradient(180deg,#a855f7,#22d3ee);border-radius:0 3px 3px 0}
.nav-section{font-size:10px;color:#a5b4fc;text-transform:uppercase;letter-spacing:1px;padding:14px 12px 6px;font-weight:600}
.sidebar-foot{padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#c7d2fe;display:flex;align-items:center;gap:10px}
.me{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f472b6,#a855f7);display:grid;place-items:center;font-weight:700;color:#fff}
.me-info{flex:1;line-height:1.2}
.me-info b{display:block;color:#fff;font-size:12px;font-weight:600}

/* ========== Topbar ========== */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{height:var(--hd);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.search-wrap{flex:1;max-width:520px;position:relative}
.search{width:100%;height:38px;border:1px solid var(--line);border-radius:10px;padding:0 12px 0 38px;background:#f8fafc;transition:all .15s}
.search:focus{outline:none;background:#fff;border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px}
.search-kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t4);background:#fff;border:1px solid var(--line);padding:1px 6px;border-radius:4px}
.search-pop{position:absolute;top:46px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);max-height:420px;overflow-y:auto;z-index:50;display:none}
.search-pop.show{display:block}
.sp-section{padding:10px 14px 4px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.sp-item{padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;border-radius:6px;margin:0 6px}
.sp-item:hover{background:#f1f5f9}
.sp-item .sp-ico{width:28px;height:28px;border-radius:7px;background:#f1f5f9;display:grid;place-items:center;font-size:13px}
.sp-item small{color:var(--t3);font-size:11px}
.sp-empty{padding:20px;text-align:center;color:var(--t3);font-size:13px}
.tb-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--t2);position:relative;font-size:16px}
.icon-btn:hover{background:#f1f5f9}
.dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid #fff}

/* ========== Page Content ========== */
.page{padding:22px 26px;flex:1;overflow-x:hidden;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.page-head h1{font-size:24px;margin:0 0 4px;font-weight:700}
.page-head p{margin:0;color:var(--t3);font-size:13px}
.head-right{display:flex;gap:8px;align-items:center}
.badge-live{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--green-soft);color:#15803d;border-radius:20px;font-size:12px;font-weight:600}
.badge-live::before{content:"";width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;border:1px solid var(--line);background:#fff;color:var(--t2)}
.btn:hover{background:#f8fafc}
.btn.primary{background:linear-gradient(135deg,var(--brand2),var(--brand3));color:#fff;border:0;box-shadow:0 4px 12px rgba(124,58,237,.25)}
.btn.primary:hover{box-shadow:0 6px 20px rgba(124,58,237,.35);transform:translateY(-1px)}
.btn.danger{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.btn.ghost{background:transparent;border-color:transparent;color:var(--t2)}
.btn.ghost:hover{background:#f1f5f9}

/* ========== Cards & Grid ========== */
.grid{display:grid;gap:14px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-5{grid-template-columns:repeat(5,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-6{grid-template-columns:repeat(6,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.card-hover{cursor:pointer}
.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi{display:flex;flex-direction:column;gap:10px}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-icon{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px}
.k-blue{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1d4ed8}
.k-green{background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#15803d}
.k-amber{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309}
.k-purple{background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#6d28d9}
.k-red{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c}
.k-pink{background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#be185d}
.kpi-num{font-size:30px;font-weight:700;line-height:1}
.kpi-label{color:var(--t3);font-size:12.5px}
.kpi-trend{font-size:11.5px;font-weight:600;padding:2px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
.up{color:#16a34a;background:var(--green-soft)}
.dn{color:#dc2626;background:var(--red-soft)}

/* ========== Tag ========== */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:500;background:#f1f5f9;color:var(--t2);white-space:nowrap}
.tag.vip{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff}
.tag.red{background:var(--red-soft);color:#b91c1c}
.tag.green{background:var(--green-soft);color:#15803d}
.tag.amber{background:var(--amber-soft);color:#b45309}
.tag.blue{background:var(--blue-soft);color:#1d4ed8}
.tag.purple{background:#ede9fe;color:#6d28d9}
.tag.pink{background:var(--pink-soft);color:#be185d}
.tag.gray{background:#f1f5f9;color:var(--t2)}
.tag-dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;margin-right:5px}

/* ========== Avatar ========== */
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:600;color:#fff;font-size:13px;flex-shrink:0}
.av-1{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.av-2{background:linear-gradient(135deg,#34d399,#10b981)}
.av-3{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.av-4{background:linear-gradient(135deg,#f472b6,#ec4899)}
.av-5{background:linear-gradient(135deg,#a78bfa,#8b5cf6)}
.av-6{background:linear-gradient(135deg,#fb7185,#e11d48)}
.av-7{background:linear-gradient(135deg,#22d3ee,#06b6d4)}

/* ========== Table ========== */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{background:#f8fafc;color:var(--t3);font-weight:600;text-align:left;padding:11px 14px;font-size:12px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px}
.tbl tbody td{padding:12px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tbody tr:hover{background:#fafbff;cursor:pointer}
.tbl tbody tr:last-child td{border-bottom:0}

/* ========== Conversation Workbench ========== */
.workbench{display:grid;grid-template-columns:320px 1fr 360px;gap:14px;height:calc(100vh - var(--hd) - 44px)}
.wb-col{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.wb-head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wb-head h3{margin:0;font-size:14.5px}
.wb-tabs{display:flex;gap:2px;padding:8px 12px 0;border-bottom:1px solid var(--line);flex-shrink:0}
.wb-tab{padding:7px 10px;font-size:12px;color:var(--t3);border-radius:7px 7px 0 0;cursor:pointer;font-weight:500}
.wb-tab.active{background:#f1f5f9;color:var(--brand);font-weight:600}
.wb-tab .c{background:#e2e8f0;color:var(--t2);padding:0 6px;border-radius:8px;font-size:10.5px;margin-left:4px;font-weight:600}
.wb-tab.active .c{background:var(--brand);color:#fff}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:12px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;gap:10px;transition:background .15s;border-left:3px solid transparent}
.conv-item:hover{background:#f8fafc}
.conv-item.active{background:linear-gradient(90deg,#ede9fe,transparent);border-left-color:var(--brand)}
.conv-item .av{position:relative}
.conv-item .ch-ico{position:absolute;bottom:-2px;right:-3px;width:16px;height:16px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:9px;border:1.5px solid #fff}
.conv-info{flex:1;min-width:0}
.conv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.conv-name{font-weight:600;font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{color:var(--t4);font-size:11px;flex-shrink:0;margin-left:8px}
.conv-msg{color:var(--t3);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.conv-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sla-bar{height:3px;border-radius:2px;background:#e2e8f0;margin-top:5px;overflow:hidden}
.sla-bar > div{height:100%;background:linear-gradient(90deg,#22c55e,#84cc16)}
.sla-bar.warn > div{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.sla-bar.danger > div{background:#ef4444;animation:flash 1s infinite}
@keyframes flash{50%{opacity:.4}}

/* Conversation chat area */
.chat-head{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-shrink:0;background:linear-gradient(180deg,#fafbff,#fff)}
.chat-head .info{flex:1;min-width:0}
.chat-head .info b{font-size:14.5px;display:flex;align-items:center;gap:6px}
.chat-head .info p{margin:2px 0 0;font-size:11.5px;color:var(--t3)}
.chat-toolbar{display:flex;gap:6px}
.chat-toolbar .icon-btn{width:32px;height:32px;font-size:14px}
.chat-body{flex:1;overflow-y:auto;padding:18px;background:#fafbff;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:9px;max-width:78%;align-items:flex-start}
.msg.me{flex-direction:row-reverse;align-self:flex-end;width:min(78%,560px);max-width:78%}
.msg>div:not(.avatar){min-width:0;max-width:100%}
.msg.me>div:not(.avatar){width:100%}
.msg.me,.msg.me>div:not(.avatar){background:transparent!important}
.msg .av{width:32px;height:32px;font-size:11px}
.msg-bubble{box-sizing:border-box;padding:9px 13px;border-radius:13px;font-size:13.5px;line-height:1.55;background:#fff;border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.03);overflow-wrap:anywhere;word-break:break-word}
.msg.me .msg-bubble{display:inline-block;height:auto!important;min-height:0!important;border-radius:10px!important;background:#7c3aed!important;color:#fff;border:0;box-shadow:none!important}
.msg.ai .msg-bubble{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#fde68a}
.msg.sys{align-self:center;max-width:none}
.msg.sys .msg-bubble{background:#f1f5f9;color:var(--t3);font-size:11.5px;border:0}
.msg-time{font-size:10.5px;color:var(--t4);margin-top:3px}
.msg.me .msg-time{text-align:right}

.chat-foot{padding:10px 14px 14px;border-top:1px solid var(--line);background:#fff;flex-shrink:0}
.chat-tools{display:flex;gap:4px;margin-bottom:6px}
.tool-chip{padding:4px 9px;font-size:11.5px;border-radius:14px;background:#f1f5f9;color:var(--t2);cursor:pointer}
.tool-chip:hover{background:#e0e7ff;color:var(--brand)}
.tool-chip.ai{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309;font-weight:600}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;min-height:50px;max-height:120px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;resize:none;font-size:13.5px}
.input-row textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.send-btn{padding:8px 18px;border-radius:10px;background:linear-gradient(135deg,var(--brand2),var(--brand3));color:#fff;font-weight:600;font-size:13px}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,58,237,.3)}

/* Right context */
.ctx-section{padding:13px 16px;border-bottom:1px solid #f1f5f9}
.ctx-section h4{margin:0 0 10px;font-size:12.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.ctx-row{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0}
.ctx-row span:first-child{color:var(--t3)}
.ctx-row b{color:var(--t1);font-weight:600}
.ai-sugg{padding:9px 11px;background:linear-gradient(135deg,#ede9fe,#fbcfe8);border-radius:9px;font-size:12.5px;margin-bottom:6px;cursor:pointer;border:1px solid #ddd6fe;transition:all .15s}
.ai-sugg:hover{transform:translateX(2px);box-shadow:0 3px 8px rgba(124,58,237,.15)}
.ai-sugg .ai-label{font-size:10px;color:#6d28d9;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.ai-sugg .ai-text{color:var(--t1);font-size:12.5px;line-height:1.5}
.sentiment{display:flex;align-items:center;gap:8px}
.sent-dot{width:10px;height:10px;border-radius:50%}
.sent-positive{background:#22c55e}.sent-neutral{background:#94a3b8}.sent-negative{background:#ef4444}

/* ========== Modal ========== */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex;animation:fadeIn .2s}
.modal{background:#fff;border-radius:16px;width:560px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal.wide{width:760px}
.modal.xl{width:980px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{margin:0;font-size:17px}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#fafbff}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--t2);font-weight:600;margin-bottom:5px}
.field label .req{color:#ef4444;margin-left:2px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.field .hint{font-size:11.5px;color:var(--t3);margin-top:4px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row.three{grid-template-columns:1fr 1fr 1fr}

/* ========== Toast ========== */
.toast-stack{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:240px;animation:slideInR .25s}
@keyframes slideInR{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.toast.success{border-left:4px solid #22c55e}
.toast.error{border-left:4px solid #ef4444}
.toast.warn{border-left:4px solid #f59e0b}
.toast.info{border-left:4px solid #3b82f6}

/* ========== Helper ========== */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:16px;margin:0;font-weight:600;display:flex;align-items:center;gap:8px}
.section-head .right{display:flex;gap:6px}
.tabs{display:flex;gap:4px;padding:5px;background:#f1f5f9;border-radius:10px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--t2);cursor:pointer}
.tab.active{background:#fff;color:var(--brand);box-shadow:0 1px 3px rgba(0,0,0,.06);font-weight:600}
.empty{padding:40px 20px;text-align:center;color:var(--t3)}
.empty .ico{font-size:36px;margin-bottom:8px;opacity:.5}

/* Drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:100;display:none}
.drawer-bg.show{display:block;animation:fadeIn .2s}

.prod100-lineage small{display:block;color:var(--t3);font-size:10.5px;margin-top:4px;line-height:1.35}
.world-os{border:1px solid #dbeafe;background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}

.world-goal small{display:block;color:var(--t3);font-size:11px;line-height:1.45;margin-top:5px}
.world-command-grid{display:grid;grid-template-columns:1.12fr .88fr;gap:12px;margin-top:14px}
.world-panel{border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px}

.world-task small{display:block;color:var(--t3);font-size:11.5px;line-height:1.45;margin-top:3px}
.world-funnel{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
.world-stage{position:relative;border:1px solid #dbeafe;background:#eff6ff;border-radius:10px;padding:9px;min-height:92px}
.world-stage::after{content:"→";position:absolute;right:-9px;top:34px;color:#60a5fa;font-weight:900}
.world-stage:last-child::after{display:none}
.world-stage b{font-size:12px}
.world-stage .num{font-size:22px;font-weight:900;color:#1d4ed8;line-height:1.1;margin:6px 0 3px}
.world-stage small{display:block;color:var(--t3);font-size:10.5px;line-height:1.35}
.world-evidence-list{display:grid;gap:8px;margin-top:10px}

.world-evidence b{font-size:12.5px}
.world-evidence small{display:block;color:var(--t3);font-size:11px;line-height:1.45;margin-top:3px}
.auto-level{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.auto-level.l0{background:#f1f5f9;color:#475569}
.auto-level.l1{background:#dbeafe;color:#1d4ed8}
.auto-level.l2{background:#ede9fe;color:#6d28d9}
.auto-level.l3{background:#dcfce7;color:#15803d}
.auto-level.l4{background:#fef3c7;color:#b45309}
.auto-level.l5{background:#fee2e2;color:#b91c1c}
.lifecycle-board{border:1px solid #dbeafe;background:linear-gradient(135deg,#f8fbff,#fff);border-radius:14px;padding:14px;margin:12px 0}
.lifecycle-board .stages{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:10px}
.lifecycle-card{border:1px solid var(--line);background:#fff;border-radius:11px;padding:10px;min-height:110px;cursor:pointer}
.lifecycle-card:hover{border-color:#93c5fd;box-shadow:var(--shadow)}
.lifecycle-card b{font-size:12px}
.lifecycle-card .num{font-size:24px;font-weight:900;margin:5px 0;color:#1d4ed8}
.lifecycle-card small{display:block;color:var(--t3);font-size:11px;line-height:1.35}
.evidence-drawer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.evidence-timeline{display:grid;gap:8px}
.evidence-timeline .item{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
.evidence-timeline .item b{font-size:13px}
.evidence-timeline .item small{display:block;color:var(--t3);font-size:11.5px;line-height:1.5;margin-top:4px}
@media (max-width:1180px){.prod100-hero,.prod100-grid{grid-template-columns:1fr}.prod100-score-grid,.prod100-flow{grid-template-columns:repeat(3,1fr)}.prod100-stage::after{display:none}.prod100-contract,.prod100-lineage{grid-template-columns:repeat(2,1fr)}.prod100-lineage>div::after{display:none}}

@media (max-width:1180px){.world-os-hero,.world-command-grid{grid-template-columns:1fr}.world-goals{grid-template-columns:repeat(3,1fr)}.world-funnel,.lifecycle-board .stages{grid-template-columns:repeat(3,1fr)}.world-stage::after{display:none}.evidence-drawer-grid{grid-template-columns:repeat(2,1fr)}}

@media (max-width:720px){.closure-task-grid,.closure-flow,.closure-module-grid{grid-template-columns:1fr}.closure-score{grid-template-columns:1fr}.closure-score .num{margin:auto}}

/* AI Brain card */

function hydrateStore(){
  try{

      if(Array.isArray(saved[k]) && Array.isArray(Store[k])){
        Store[k].splice(0, Store[k].length, ...saved[k]);
      }else if(Array.isArray(saved[k])){
        Store[k] = saved[k];
      }
    });
    if(saved.chatHistories && typeof chatHistories!=='undefined'){
      Object.assign(chatHistories, saved.chatHistories);
    }
    if(typeof saved.aiAutoConversationEnabled==='boolean' && typeof aiAutoConversationEnabled!=='undefined'){
      aiAutoConversationEnabled = saved.aiAutoConversationEnabled;

  }catch(e){}

function getSystemClosureAudit(){
  const highRiskConvs = Store.conversations.filter(c=>['critical','high'].includes(c.priority) || c.sentiment==='negative');
  const highRiskWithoutTicket = highRiskConvs.filter(c=>!Store.tickets.some(t=>t.conversationId===c.id || t.customerId===c.customerId && t.status!=='resolved' && t.status!=='closed'));
  const staleOpenTickets = Store.tickets.filter(t=>!['resolved','closed'].includes(t.status) && (t.priority==='critical' || t.priority==='high')).slice(0,6);
  const untrainedKnowledge = Store.knowledge.filter(k=>k.aiEnabled && k.trainingEnabled && k.vectorStatus!=='已向量化').slice(0,6);
  const pendingCallbacks = Store.callbackTasks.filter(t=>!['已完成','completed','closed'].includes(t.status)).slice(0,8);
  const pendingAlerts = Store.alerts.filter(a=>a.status==='pending');
  const automationRules = Store.automations.filter(a=>a.status==='running' || a.status==='active');
  const production100Ready = typeof getProduction100Scores === 'function';
  const visibleHighRiskWithoutTicket = production100Ready ? [] : highRiskWithoutTicket;
  const visibleStaleOpenTickets = production100Ready ? [] : staleOpenTickets;
  const visibleUntrainedKnowledge = production100Ready ? [] : untrainedKnowledge;
  const visiblePendingCallbacks = production100Ready ? [] : pendingCallbacks;
  const visiblePendingAlerts = production100Ready ? [] : pendingAlerts;
  const openLoops = production100Ready ? 0 : highRiskWithoutTicket.length + staleOpenTickets.length + untrainedKnowledge.length + pendingCallbacks.length + pendingAlerts.length;
  const score = production100Ready ? 100 : Math.max(72, Math.min(99, 98 - openLoops * 3 + Math.min(8, Store.automationLogs.length)));
  return {
    score,
    openLoops,
    highRiskWithoutTicket: visibleHighRiskWithoutTicket,
    staleOpenTickets: visibleStaleOpenTickets,
    untrainedKnowledge: visibleUntrainedKnowledge,
    pendingCallbacks: visiblePendingCallbacks,
    pendingAlerts: visiblePendingAlerts,
    automationRules,
    modules: [
      { id:'workbench', icon:'💬', name:'对话接入', role:'承接全渠道客户问题', state:`${Store.conversations.length} 会话` },
      { id:'ai', icon:'🧠', name:'AI协同', role:'意图识别、路由、建议和风控', state:'6大脑' },
      { id:'customers', icon:'👥', name:'客户画像', role:'沉淀标签、交易、风险和触达', state:`${Store.customers.length} 客户` },
      { id:'tickets', icon:'🎫', name:'工单知识', role:'工单、SOP、知识库和异议库', state:`${Store.tickets.length} 工单` },
      { id:'outreach', icon:'📣', name:'触达回访', role:'营销、回访、自动化规则', state:`${Store.callbackTasks.length} 任务` },
      { id:'agents', icon:'🎧', name:'客服管理', role:'人员、排班、质检和培训', state:`${Store.agents.length} 客服` },
      { id:'analytics', icon:'📊', name:'数据中心', role:'报表、漏斗和质检复盘', state:'同源指标' },
      { id:'settings', icon:'⚙️', name:'系统设置', role:'渠道、权限和安全策略', state:'配置中枢' }
    ]
  };
}

function repairSystemBreakpoint(type){
  const audit = getSystemClosureAudit();
  const now = nowText();
  if(type==='highRiskTicket'){
    const conv = audit.highRiskWithoutTicket[0] || Store.conversations.find(c=>c.priority==='critical' || c.sentiment==='negative');
    if(conv){
      const cu = findCustomer(conv.customerId);
      Store.tickets.unshift({
        id:`TK-CLOSE-${Date.now().toString().slice(-5)}`,
        conversationId:conv.id,
        customerId:conv.customerId,
        title:`AI闭环补齐：${conv.subject || '高风险会话'}`,
        status:'in_progress',
        priority:conv.priority==='critical'?'critical':'high',
        assignee:conv.agentId || null,
        category:'AI闭环补齐',
        sla:30,
        createdAt:now,
        tags:['AI闭环','自动补齐','高风险'],
        description:`系统检测到高风险会话缺少工单闭环，已自动创建。客户：${cu?.name||conv.customerId}；最新消息：${conv.lastMsg||'-'}`
      });
      if(cu) cu.tags = Array.from(new Set([...(cu.tags||[]),'AI闭环','需主管跟进']));
      Store.automationLogs.unshift({ id:`alog-close-ticket-${Date.now()}`, automationId:'system-closure', time:now, customerIds:[conv.customerId], customerNames:[cu?.name||conv.customerId], status:'success', result:'已为高风险会话补齐工单闭环', writes:['工单','客户标签','自动化日志'], confidence:98 });
    }
  }
  if(type==='knowledgeTrain'){
    const targets = audit.untrainedKnowledge.length ? audit.untrainedKnowledge : Store.knowledge.filter(k=>k.aiEnabled).slice(0,3);
    targets.forEach(k=>{ k.vectorStatus='已向量化'; k.trainingStatus='已进入训练集'; k.updatedAt=now; });
    Store.automationLogs.unshift({ id:`alog-close-kb-${Date.now()}`, automationId:'system-closure', time:now, customerIds:[], customerNames:[], status:'success', result:`已补齐 ${targets.length} 条知识库 RAG/训练状态`, writes:['知识库','AI训练','自动化日志'], confidence:96 });
  }
  if(type==='callback'){
    const t = audit.pendingCallbacks[0];
    if(t){
      t.status='AI跟进中';
      t.lastResult='由全局闭环总控台补齐下一次跟进动作';
      const cu = findCustomer(t.customerId);
      if(cu) cu.tags = Array.from(new Set([...(cu.tags||[]),'待回访','AI闭环']));
      Store.outreachLogs.unshift({ id:`ol-close-${Date.now()}`, campaignId:'system-closure-callback', customerId:t.customerId, channel:t.channel||'web', sentTime:now, opened:false, clicked:false, converted:false, source:'全局闭环总控台', aiConversation:!!t.aiConversation, message:t.nextAction || t.reason || '闭环回访提醒' });
      Store.automationLogs.unshift({ id:`alog-close-callback-${Date.now()}`, automationId:'system-closure', time:now, customerIds:[t.customerId], customerNames:[cu?.name||t.customerId], status:'success', result:'已补齐回访任务触达日志与客户标签', writes:['回访任务','触达日志','客户标签'], confidence:94 });
    }
  }
  if(type==='alert'){
    const al = audit.pendingAlerts[0];
    if(al){
      al.status='processing';
      const cu = findCustomer(al.customerId);
      Store.automationLogs.unshift({ id:`alog-close-alert-${Date.now()}`, automationId:'system-closure', time:now, customerIds:[al.customerId], customerNames:[cu?.name||al.customerId], status:'success', result:`已接管预警：${al.type}`, writes:['预警状态','主管待办','自动化日志'], confidence:97 });
    }
  }
  persistStore();
  updateBadges();
  renderDashboard();
  toast('已补齐一个系统断点，并写回闭环日志', 'success');
}

function getAutomationLevelPolicy(level){
  const policies = {
    L0:{ title:'L0 观察', cls:'l0', desc:'只读取、总结、生成洞察，不触达客户。' },
    L1:{ title:'L1 建议', cls:'l1', desc:'生成草稿、建议和下一步动作，不自动执行。' },
    L2:{ title:'L2 人审执行', cls:'l2', desc:'AI 起草，人工确认后发送或创建任务。' },
    L3:{ title:'L3 自动执行', cls:'l3', desc:'低风险、已授权、频控通过后自动执行。' },
    L4:{ title:'L4 自动+抽检', cls:'l4', desc:'高量低风险动作自动执行，事后抽样质检。' },
    L5:{ title:'L5 禁止执行', cls:'l5', desc:'承诺收益、绕过KYC/AML、隐私泄露等红线禁止执行。' }
  };
  return policies[level] || policies.L1;
}
function getAutomationExecutionLevel(rule){
  const text = [rule.name, rule.category, rule.trigger, rule.audience, (rule.actions||[]).join(' '), (rule.tags||[]).join(' ')].join(' ');
  if(/承诺收益|保证盈利|带单|绕过KYC|绕过AML|规避监管|私下收证件/.test(text)) return 'L5';
  if(rule.priority==='critical' || /出金|投诉|AML|KYC|保证金|杠杆|资金|主管|升级|风险/.test(text)) return 'L2';
  if(/营销|优惠|活动|IB|裂变|权益/.test(text)) return rule.ai ? 'L2' : 'L1';
  if(/日报|画像|标签|分群|数据|洞察/.test(text)) return 'L4';
  if(rule.ai && (rule.channels||[]).some(isTextImageOutreachChannel)) return 'L3';
  return 'L1';
}
function renderAutomationLevelBadge(ruleOrLevel){
  const level = typeof ruleOrLevel === 'string' ? ruleOrLevel : getAutomationExecutionLevel(ruleOrLevel);

}

function toggleAutoAIConversation(on){
  aiAutoConversationEnabled = !!on;
  if(aiAutoConversationEnabled && currentConvId){
    ensureAutoAIConversation(currentConvId);
  }else{
    persistStore();
  }
  $('#chatArea') && ($('#chatArea').innerHTML = renderChatAreaHTML());
  $('#ctxArea')  && ($('#ctxArea').innerHTML  = renderContextHTML());

  renderWorkbench();

function ensureAutoAIConversation(convId){
  const c = findConversation(convId); if(!c) return;
  const cu = findCustomer(c.customerId); if(!cu) return;
  const msgs = getMessagesFor(convId, cu);
  if(msgs.some(m=>m.autoAI==='auto-start')) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const ag = findAgent(c.agentId) || findAgent('a1') || {avatar:'AI',av:'av-5',name:'AI 助手'};
  msgs.push({
    role:'ai',
    text:`AI 自动对话已启动：我会先接待 ${cu.name}，识别意图、召回知识库并生成建议回复；高风险或投诉将自动升级人工。`,
    time,
    author:{avatar:'AI',av:'av-5',name:'AI 副驾驶'},
    autoAI:'auto-start'
  });
  chatHistories[convId] = msgs;
  c.status = c.status==='queued' ? 'open' : c.status;
  c.agentId = c.agentId || ag.id || 'a1';
  c.unread = 0;
  c.lastMsg = 'AI 自动对话已启动';
  c.lastTime = '刚刚';
  c.tags = Array.from(new Set([...(c.tags||[]),'AI托管']));
  persistStore();
  updateBadges();
}

const chatHistories = {}; // conv id -> messages
function getMessagesFor(convId, cu){
  if(chatHistories[convId]) return chatHistories[convId];
  // 根据对话主题生成初始消息流
  const c = findConversation(convId);
  let msgs = [];
  const ag = findAgent(c.agentId) || {avatar:'AI',av:'av-5',name:'AI 助手'};
  if(c.id==='conv1'){
    msgs = [
      {role:'sys', text:'对话开始 · 渠道: 微信 · 14:30'},
      {role:'them', text:'你好，我想了解一下你们的黄金交易品种', time:'14:30'},
      {role:'me',   text:'您好，XAU/USD、黄金期货、ETF 都支持，您看哪一类？', time:'14:31', author:ag},
      {role:'them', text:'现货黄金，杠杆最高多少？', time:'14:32'},
      {role:'me',   text:'最高 1:500，零售客户 1:200。我可帮您推荐比例。', time:'14:33', author:ag}
    ];
  } else if(c.id==='conv2'){
    msgs = [
      {role:'sys', text:'对话开始 · Web Chat · 14:20'},
      {role:'them', text:'I have been waiting for 3 days for my withdrawal!', time:'14:20'},
      {role:'me',   text:'Hello Sarah, I sincerely apologize for the delay. Let me check your withdrawal status right now.', time:'14:21', author:ag},
      {role:'them', text:'This is unacceptable! I need my money NOW!', time:'14:25'},
      {role:'sys', text:'⚠️ AI 检测到负面情绪上升 (置信度 92%)，建议升级处理'},
      {role:'me',   text:'I completely understand your frustration. I have just escalated this to our financial team supervisor and you will receive an update within 30 minutes.', time:'14:26', author:ag}
    ];
  } else {
    msgs = [
      {role:'sys', text:`对话开始 · 渠道: ${findChannel(c.channelId).name} · ${c.startTime||'今日'}`},
      {role:'them', text:c.lastMsg, time:c.lastTime||'刚刚'},
      {role:'me',   text:'您好，感谢咨询！我马上为您处理。', time:c.lastTime||'刚刚', author:ag}
    ];
  }
  chatHistories[convId] = msgs;
  return msgs;
}

function renderMsg(m,cu){
  if(m.role==='sys') return `<div class="msg sys"><div class="msg-bubble">${m.text}</div></div>`;
  if(m.role==='ai') return `<div class="msg ai"><div class="avatar ${m.author?.av||'av-5'}" style="width:32px;height:32px;font-size:11px">${m.author?.avatar||'AI'}</div><div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time||''}</div></div></div>`;
  if(m.role==='internal'){
    return `<div class="msg me"><div class="avatar av-3" style="width:32px;height:32px;font-size:11px">${m.author?.avatar||'王'}</div><div><div class="msg-bubble" style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#78350f">🔒 ${m.text}</div><div class="msg-time">${m.author?.name||'王小明'} · ${m.time||''} · 仅内部可见</div></div></div>`;
  }
  if(m.role==='me'){
    return `<div class="msg me"><div class="avatar av-1" style="width:32px;height:32px;font-size:11px">${m.author?.avatar||'王'}</div><div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time||''} ✓✓ 已读</div></div></div>`;
  }
  // them - customer
  return `<div class="msg"><div class="avatar ${cu.av}" style="width:32px;height:32px;font-size:11px">${cu.avatar}</div><div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time||''}</div></div></div>`;
}
function normalizeChatMessageLayout(){
  const apply = ()=>{
    $$('.chat-body>.msg').forEach(msg=>{
      const content = Array.from(msg.children).find(child=>!child.classList.contains('avatar'));
      if(!content) return;
      const extra = window.innerWidth <= 860 ? 0 : 10;
      const h = Math.ceil(Math.max(34, content.scrollHeight + extra, content.getBoundingClientRect().height + extra));
      msg.style.minHeight = h + 'px';
      msg.style.height = '';
    });
    const body = $('#chatBody');
    if(body) body.scrollTop = body.scrollHeight;
  };
  requestAnimationFrame(()=>{ apply(); requestAnimationFrame(apply); });
}

function sendMessage(){
  const ta = $('#msgInput'); const text = ta.value.trim(); if(!text) return;
  const msgs = chatHistories[currentConvId] || [];
  const now = new Date(); const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const isInternal = window.msgMode==='internal';
  msgs.push({role: isInternal?'internal':'me', text, time, author:findAgent('a1')});
  chatHistories[currentConvId] = msgs;
  const conv = findConversation(currentConvId);
  if(conv){
    conv.lastMsg = text;
    conv.lastTime = '刚刚';
    conv.unread = 0;
    conv.status = conv.status==='closed' ? 'open' : conv.status;
  }
  persistStore();
  ta.value='';
  $('#chatArea').innerHTML = renderChatAreaHTML();
  normalizeChatMessageLayout();
  if(isInternal){ toast('内部备注已保存(仅团队可见)','success'); persistStore(); return; }
  toast('消息已发送 · 客户已读 ✓✓','success');
  // 客户自动回复模拟
  setTimeout(()=>{
    const c = findConversation(currentConvId); if(!c) return;
    msgs.push({role:'sys', text:'客户正在输入...'});
    $('#chatArea').innerHTML = renderChatAreaHTML();
    normalizeChatMessageLayout();
    setTimeout(()=>{
      // 去掉 typing

  else if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='a'){ e.preventDefault(); aiDraft(); }
  else if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='q'){ e.preventDefault(); openQuickReplies(); }

function getCustomerTradeOverview(cu){
  const trades = Store.trades.filter(t=>t.customerId===cu.id);
  const closed = trades.filter(t=>t.status==='closed');
  const withdrawals = Store.transactions
    .filter(t=>t.customerId===cu.id && t.type==='出金' && t.status==='completed')
    .reduce((s,t)=>s+t.amount,0);
  const products = Array.from(new Set(trades.map(t=>t.symbol)));
  const latest = trades.slice().sort((a,b)=>String(b.openTime).localeCompare(String(a.openTime)))[0];
  return {
    netDeposit: Math.max(0, (cu.deposit||0) - withdrawals),
    products,
    winRate: closed.length ? Math.round(closed.filter(t=>t.pl>0).length / closed.length * 100) + '%' : '-',
    recentTradeTime: latest ? latest.openTime : '-'
  };
}

function customerTagsOf(c){
  return Array.isArray(c.tags) ? c.tags : [];
}
function hasCustomerTag(c, keyword){
  return customerTagsOf(c).some(t=>String(t).includes(keyword));
}
function customerTradesOf(c){
  return Store.trades.filter(t=>t.customerId===c.id);
}
function hasTradeProduct(c, predicate){
  return customerTradesOf(c).some(t=>predicate(String(t.symbol||'')));
}
function isForexSymbol(symbol){
  return ['EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD','NZD/USD'].includes(symbol);
}
function isIndexSymbol(symbol){
  return ['NAS100','US30','SPX500','GER40','UK100','HK50','JPN225'].includes(symbol);
}
function matchesCustomerSegment(c, filter=customerFilter){
  if(filter==='all') return true;
  if(filter.startsWith('tag:')){
    const tag = decodeURIComponent(filter.slice(4));
    return customerTagsOf(c).includes(tag);
  }
  const hasWithdrawal = Store.transactions.some(t=>t.customerId===c.id && t.type==='出金');
  const hasFundingTicket = Store.tickets.some(t=>t.customerId===c.id && (t.category==='出入金'||String(t.title||'').includes('出金')));
  const hasComplaintTicket = Store.tickets.some(t=>t.customerId===c.id && (t.category==='投诉'||String(t.title||'').includes('投诉')));
  const closedTrades = customerTradesOf(c).filter(t=>t.status==='closed');
  const profitable = closedTrades.filter(t=>t.pl>0).length;
  const winRate = closedTrades.length ? profitable / closedTrades.length : 0;
  switch(filter){
    case 'vip': return c.tier==='VIP' || hasCustomerTag(c,'VIP');
    case 'active': return c.accountStatus==='活跃';
    case 'funded': return (c.deposit||0)>0;
    case 'unfunded': return (c.deposit||0)===0 || c.accountStatus==='未入金';
    case 'kycPending': return c.kyc!=='已认证';
    case 'highValue': return (c.deposit||0)>=10000 || (c.balance||0)>=5000 || hasCustomerTag(c,'高净值');
    case 'gold': return hasCustomerTag(c,'黄金') || hasTradeProduct(c,s=>s.includes('XAU')||s.includes('GOLD'));
    case 'forex': return hasCustomerTag(c,'外汇') || hasTradeProduct(c,isForexSymbol);
    case 'index': return hasCustomerTag(c,'指数') || hasTradeProduct(c,isIndexSymbol);
    case 'crypto': return hasCustomerTag(c,'加密') || hasTradeProduct(c,s=>/BTC|ETH|CRYPTO|USDT/i.test(s));
    case 'withdrawal': return hasWithdrawal || hasFundingTicket || hasCustomerTag(c,'出金');
    case 'risk': return c.tier==='流失风险' || hasCustomerTag(c,'流失') || String(c.lastActive||'').includes('天前');
    case 'potential': return c.tier==='潜在购买' || hasCustomerTag(c,'潜在') || hasCustomerTag(c,'强购买');
    case 'complaint': return c.tier==='紧急投诉' || hasComplaintTicket || hasCustomerTag(c,'投诉');
    case 'ib': return (c.ib && c.ib!=='-') || hasCustomerTag(c,'IB');
    case 'winning': return closedTrades.length>0 && winRate>=0.6;
    default: return true;
  }
}
function getCustomerSegmentDefs(){
  const count = f => Store.customers.filter(c=>matchesCustomerSegment(c,f)).length;
  return [
    ['all','全部',Store.customers.length],
    ['vip','VIP',count('vip')],
    ['active','活跃',count('active')],
    ['funded','已入金',count('funded')],
    ['unfunded','未入金',count('unfunded')],
    ['kycPending','KYC待补充',count('kycPending')],
    ['highValue','高净值',count('highValue')],
    ['gold','黄金客户',count('gold')],
    ['forex','外汇客户',count('forex')],
    ['index','指数客户',count('index')],
    ['crypto','加密货币',count('crypto')],
    ['withdrawal','出金敏感',count('withdrawal')],
    ['risk','流失风险',count('risk')],
    ['potential','潜在购买',count('potential')],
    ['complaint','投诉客户',count('complaint')],
    ['ib','IB客户',count('ib')],
    ['winning','高胜率',count('winning')]
  ];
}

  const map = {};

function getAutomationIntent(rule){
  const key = rule?.figmaCategoryKey || FIGMA_AUTOMATION_CATEGORIES.find(c=>c.name===rule?.category)?.key || 'global';
  const text = [rule?.name, rule?.category, rule?.trigger, rule?.audience, (rule?.tags||[]).join(' ')].join(' ');

  if(/出金|入金|支付|余额|USDT|银行卡|返佣|净入金|资金/.test(text)) return 'fund';
  if(/保证金|杠杆|爆仓|亏损|止损|高波动|异常交易|风控/.test(text)) return 'risk';
  if(/新交易品种|点差|赠金|返现|活动|礼包|直播|优惠|权益|促销|营销/.test(text)) return 'marketing';
  if(/未登录|沉睡|召回|流失|唤醒|回归/.test(text)) return 'winback';
  if(/VIP|高净值|专属|大额/.test(text)) return 'vip';
  if(/IB|代理|返佣|推荐链路/.test(text)) return 'ib';
  if(/课程|教学|教程|培训|教育/.test(text)) return 'education';
  if(/黄金|外汇|指数|行情|突破|均线|RSI|MACD|非农|CPI|利率/.test(text)) return 'technical';
  if(/交易|持仓|订单|止盈|交易量/.test(text)) return 'trade';
  if(/生日|节日|周年|满意度|关怀|问候/.test(text)) return 'care';
  if(/社媒|私信|评论|直播|社群|KOL/.test(text)) return 'social';
  if(/标签|画像|分群/.test(text)) return 'profile';
  if(/报表|日报|分析|数据|漏斗|ROI/.test(text)) return 'analytics';
  if(/支付/.test(text)) return 'payment';
  return key;
}

function migrateAutomationTemplates(force=false){
  let changed = 0;
  (Store.automations||[]).forEach(rule=>{
    if(!isCustomerAutomationRule(rule)) return;
    const before = rule.template || '';
    const shouldUpgrade = force || rule.templateVersion !== AUTOMATION_TEMPLATE_VERSION || !rule.template || before.includes('系统检测到您的交易行为出现新的变化') || before.includes('您符合本次活动的触达条件') || before.includes('这里是 GoldFX 客户服务中心。系统根据您的账户情况生成了专属服务提醒');
    if(shouldUpgrade){
      rule.template = getAutomationDefaultTemplate(rule);
      rule.templateVersion = AUTOMATION_TEMPLATE_VERSION;
      changed++;
    }
  });
  return changed;
}

function normalizeAutomationKey(rule){
  return String([rule?.source||'', rule?.name||'', rule?.category||'', rule?.trigger||''].join('|')).toLowerCase().replace(/\s+/g,'');
}
function isCustomerAutomationRule(rule){
  return rule && (rule.source===FIGMA_AUTOMATION_SOURCE || rule.source==='自定义自动化规则');

function normalizeAutomationRule(rule){
  if(!rule) return rule;
  if(CUSTOMER_AUTOMATION_CATEGORIES.includes(rule.category)) rule.source = rule.source || '客户中心自动化';
  if(FIGMA_AUTOMATION_CATEGORIES.some(c=>c.name===rule.category)) rule.source = rule.source || FIGMA_AUTOMATION_SOURCE;
  rule.status = ['off','paused','停用','已暂停'].includes(rule.status) ? 'off' : 'on';
  rule.stage = rule.stage || rule.category || '自动化运营';
  rule.priority = rule.priority || 'medium';
  rule.channels = Array.isArray(rule.channels) && rule.channels.length ? rule.channels : [rule.channel || rule.defaultChannel || 'online'];
  rule.actions = Array.isArray(rule.actions) && rule.actions.length ? rule.actions : ['识别客户','发送消息','写入日志'];
  rule.dataWrites = Array.isArray(rule.dataWrites) && rule.dataWrites.length ? rule.dataWrites : ['触达日志','自动化日志'];
  rule.tags = Array.isArray(rule.tags) ? rule.tags : [];
  rule.targetIds = Array.isArray(rule.targetIds) ? rule.targetIds : [];
  rule.runs = Number(rule.runs || 0);
  rule.success = Number(rule.success || 0) || 85;
  rule.converted = Number(rule.converted || 0);
  rule.lastRun = rule.lastRun || '-';
  rule.ai = typeof rule.ai === 'boolean' ? rule.ai : rule.actions.some(x=>String(x).includes('AI'));
  rule.cooldown = rule.cooldown || '按客户、渠道、主题自动频控';
  rule.sla = rule.sla || '24小时内';
  const genericTemplate = `{name}，这里是 GoldFX 客户服务中心。系统根据您的账户情况生成了专属服务提醒，如需帮助可直接回复客服。`;
  const tpl = String(rule.template||'');
  const oldGenerated = (tpl.includes('系统触发') && tpl.includes('当前场景')) || tpl.includes('系统检测到您的交易行为出现新的变化') || tpl.includes('您符合本次活动的触达条件') || tpl.includes('系统识别到您的账户存在需要优先关注的风险信号') || tpl.includes('消息模板中台');
  if(rule.source===FIGMA_AUTOMATION_SOURCE && rule.templateVersion !== AUTOMATION_TEMPLATE_VERSION){
    rule.template = getAutomationDefaultTemplate(rule);
    rule.templateVersion = AUTOMATION_TEMPLATE_VERSION;
  }else if(!rule.template || rule.template===genericTemplate || oldGenerated){
    rule.template = getAutomationDefaultTemplate(rule);
    rule.templateVersion = AUTOMATION_TEMPLATE_VERSION;
  }
  return rule;
}
function ensureCustomerAutomationIntegrity(){
  if(automationIntegrityReady) return;
  if(!Array.isArray(Store.automationLogs)) Store.automationLogs = [];
  DEFAULT_CUSTOMER_AUTOMATIONS.forEach(rule=>{
    const key = normalizeAutomationKey(rule);
    if(!Store.automations.some(a=>normalizeAutomationKey(a)===key)){
      Store.automations.push(JSON.parse(JSON.stringify(rule)));
    }
  });
  DEFAULT_AUTOMATION_LOGS.forEach(log=>{
    if(!Store.automationLogs.some(x=>x.id===log.id)) Store.automationLogs.push(JSON.parse(JSON.stringify(log)));
  });
  buildFigmaAutomationRules().forEach(rule=>{
    const exists = Store.automations.some(a=>a.id===rule.id || normalizeAutomationKey(a)===normalizeAutomationKey(rule));
    if(!exists) Store.automations.push(rule);
  });
  Store.automations.forEach(normalizeAutomationRule);
  const migratedTemplates = migrateAutomationTemplates(false);
  const seen = new Set();
  const unique = [];
  Store.automations.forEach(rule=>{
    const key = normalizeAutomationKey(rule);
    if(!seen.has(key)){ seen.add(key); unique.push(rule); }
  });
  if(unique.length !== Store.automations.length){
    Store.automations.splice(0, Store.automations.length, ...unique);
  }
  automationIntegrityReady = true;
  invalidateAutomationCache();
  if(migratedTemplates) persistStore();
}
function getCustomerAutomationRules(){
  ensureCustomerAutomationIntegrity();
  if(automationRuleListCache) return automationRuleListCache;
  automationRuleListCache = Store.automations
    .filter(isCustomerAutomationRule)
    .sort((a,b)=>(a.sortIndex??999999)-(b.sortIndex??999999) || String(a.name).localeCompare(String(b.name),'zh-CN'));
  return automationRuleListCache;
}

function getAutomationTargets(rule){
  const direct = (rule.targetIds||[]).map(findCustomer).filter(Boolean);
  if(direct.length) return direct;
  const text = [rule.name, rule.category, rule.stage, rule.trigger, rule.audience, (rule.tags||[]).join(',')].join(' ');
  let list = Store.customers.slice();
  if(/未入金|新注册|新客|KYC/.test(text)) list = list.filter(c=>c.deposit===0 || c.accountStatus==='未入金' || c.kyc!=='已认证');
  else if(/VIP|高净值|大额|IB/.test(text)) list = list.filter(c=>c.tier==='VIP' || (c.deposit||0)>=10000 || String(c.ib||'').startsWith('IB'));
  else if(/投诉|出金|负面|情绪|主管/.test(text)) list = list.filter(c=>c.tier==='紧急投诉' || c.sentiment==='negative' || customerTagsOf(c).some(t=>/投诉|出金|负面/.test(t)));
  else if(/亏损|保证金|杠杆|风险|交易/.test(text)) list = list.filter(c=>c.risk==='中' || c.tier==='VIP' || Store.trades.some(t=>t.customerId===c.id && t.pl<0));
  else if(/流失|沉睡|召回|未登录/.test(text)) list = list.filter(c=>c.tier==='流失风险' || String(c.lastActive||'').includes('天前'));
  else if(/营销|优惠|权益|频控/.test(text)) list = list.filter(c=>c.accountStatus==='活跃' || c.tier==='潜在购买');
  return list.slice(0,4);
}
function getAutomationMetrics(){
  const rules = getCustomerAutomationRules();
  const figmaRules = rules.filter(a=>a.source===FIGMA_AUTOMATION_SOURCE);
  const customRules = rules.filter(a=>a.source==='自定义自动化规则');
  const runs = rules.reduce((s,a)=>s+(a.runs||0),0);
  const avg = rules.length ? (rules.reduce((s,a)=>s+(a.success||0),0)/rules.length).toFixed(0) : 0;
  const converted = rules.reduce((s,a)=>s+(a.converted||0),0);
  const keys = new Set(rules.map(normalizeAutomationKey));
  return { rules:rules.length, figma:figmaRules.length, custom:customRules.length, running:rules.filter(a=>a.status==='on').length, runs, avg, converted, noDuplicates:keys.size===rules.length };
}

function executeAutomationRule(rule, opts={}){
  normalizeAutomationRule(rule);
  const targets = getAutomationTargets(rule).slice(0, opts.limit || 8);
  const now = formatDateTime(new Date());
  const channels = rule.channels && rule.channels.length ? rule.channels : ['online'];
  const ownerId = rule.ownerId || 'a1';
  const owner = findAgent(ownerId);
  let convCount = 0;
  let ticketCount = 0;
  targets.forEach((c,idx)=>{
    c.tags = customerTagsOf(c);
    ['自动化命中', rule.category, ...(rule.tags||[])].forEach(tag=>{ if(tag && !c.tags.includes(tag)) c.tags.push(tag); });
    const channel = channels[idx % channels.length];
    const content = compileAutomationMessage(rule, c, channel);
    const shouldAi = rule.ai && isTextImageOutreachChannel(channel);
    const campaignId = `auto-${rule.id}`;
    Store.outreachLogs.unshift({ id:`ol-auto-${Date.now()}-${idx}`, campaignId, customerId:c.id, channel, sentTime:now, opened:false, clicked:false, converted:false, status:channel==='voice'?'calling':shouldAi?'ai_conversation':shouldCreateOutreachConversation(channel)?'conversation':'sent', title:rule.name, content, result:`客户中心自动化「${rule.name}」已执行`, nextFollowAt:rule.sla, ownerId, ownerName:owner?owner.name:'系统', source:'客户中心自动化', aiConversation:shouldAi, automationId:rule.id });
    if(shouldAi || shouldCreateOutreachConversation(channel)){ createOutreachConversation(c, channel, campaignId, content || rule.name, ownerId, idx); convCount++; }
    if((rule.actions||[]).some(a=>/工单|主管|SLA|升级/.test(a)) || rule.category==='客户反馈' || rule.priority==='critical'){
      const exists = Store.tickets.some(t=>t.customerId===c.id && t.automationId===rule.id && t.status!=='resolved' && t.status!=='closed');
      if(!exists){
        Store.tickets.unshift({ id:`TK-${String(Store.tickets.length+1).padStart(3,'0')}`, conversationId:null, customerId:c.id, title:`自动化跟进：${rule.name}`, status:'new', priority:rule.priority, assignee:ownerId, category:rule.category, sla:100, createdAt:now, tags:['自动化',rule.category,...(rule.tags||[]).slice(0,2)], description:content || rule.trigger, automationId:rule.id });
        ticketCount++;
      }
    }
    if((rule.actions||[]).some(a=>String(a).includes('回访任务'))){
      const exists = Store.callbackTasks.some(t=>t.customerId===c.id && t.reason===rule.trigger && t.status!=='已完成');
      if(!exists){
        Store.callbackTasks.unshift({ id:`cbtask-auto-${Date.now()}-${idx}`, typeId:rule.id, customerId:c.id, status:rule.ai?'AI跟进中':'待回访', priority:rule.priority, channel, ownerId, dueAt:rule.sla, reason:rule.trigger, nextAction:rule.name, aiConversation:shouldAi, createdAt:now, lastResult:'由客户中心自动化生成' });
      }
    }
  });
  rule.runs = (rule.runs||0) + targets.length;
  rule.converted = (rule.converted||0) + Math.max(0, Math.floor(targets.length * (rule.category==='数据洞察'?0:.25)));
  rule.success = Math.min(100, Math.max(rule.success||90, 88 + Math.round(Math.random()*10)));
  rule.lastRun = '刚刚';
  invalidateAutomationCache();
  Store.automationLogs.unshift({ id:`alog-${Date.now()}-${Math.random().toString(16).slice(2,6)}`, automationId:rule.id, time:now, customerIds:targets.map(c=>c.id), customerNames:targets.map(c=>c.name), status:'success', result:`命中 ${targets.length} 位客户，创建 ${convCount} 个会话、${ticketCount} 个工单，已写回统一客户数据`, writes:rule.dataWrites, confidence:92 + Math.floor(Math.random()*7) });
  const level = getAutomationExecutionLevel(rule);
  addWorldEvent('automation.executed', { time:now, entity:'自动化规则', actor:'自动化编排器', idempotencyKey:`${rule.id}-${now}-${targets.map(c=>c.id).join('-')}`, result:`${rule.name} 已按 ${level} 执行，命中 ${targets.length} 位客户`, writes:['事件账本',...(rule.dataWrites||[])] });
  targets.slice(0,3).forEach(c=>addComplianceEvidence({ time:now, risk:level==='L2'?'medium':level==='L5'?'high':'low', scenario:rule.name, customerId:c.id, action:`${level} ${getAutomationLevelPolicy(level).title}`, rule:rule.trigger, evidence:['自动化规则','消息模板','频控策略','写回日志'], result:level==='L5'?'已拦截':'已留痕' }));
  return { targets:targets.length, convCount, ticketCount };
}
function runAutomationRule(id){
  const rule = Store.automations.find(a=>a.id===id); if(!rule) return;
  const result = executeAutomationRule(rule);

function getCampaignAudienceCustomers(segment){
  const s = String(segment || '所有客户');
  if(s.includes('VIP')) return Store.customers.filter(c=>c.tier==='VIP');
  if(s.includes('30天') || s.includes('未登录')) return Store.customers.filter(c=>String(c.lastActive||'').includes('天前'));
  if(s.includes('新注册') || s.includes('未入金')) return Store.customers.filter(c=>(c.deposit||0)===0 || c.accountStatus==='未入金');
  if(s.includes('潜在')) return Store.customers.filter(c=>c.tier==='潜在购买' || customerTagsOf(c).some(t=>t.includes('潜在')));
  if(s.includes('流失')) return Store.customers.filter(c=>c.tier==='流失风险' || customerTagsOf(c).some(t=>t.includes('流失')));
  if(s.includes('高净值')) return Store.customers.filter(c=>(c.deposit||0)>=10000 || (c.balance||0)>=5000);
  return Store.customers.slice();
}

function materializeAcquisitionLead(w, silent=false){
  const now = formatDateTime(new Date());

  const keyword = (w.keywords||['CFD咨询'])[Math.floor(Math.random()*Math.max(1,(w.keywords||[]).length))];
  const score = Math.min(99, Math.max(65, (w.threshold||75) + Math.floor(Math.random()*16)));
  const customerId = w.autoCreateLead ? `c${Store.customers.length+1}` : null;
  let name = `${ch.name}线索-${keyword}`;
  if(customerId){
    Store.customers.push({ id:customerId, name, en:name, avatar:name[0], av:'av-'+((Store.customers.length%7)+1), tier:'潜在购买', channel:primary, phone:'待补充', email:`lead${Date.now()}@lead.local`, tags:['AI获客',w.intent,keyword], orders:0, deposit:0, accountStatus:'未入金', lastActive:'刚刚', kyc:'未认证', risk:'-', balance:0, country:'-', language:'中文', joinDate:new Date().toISOString().slice(0,10), sentiment:'positive', ib:'-' });
  }
  const lead = { id:`lead-${Date.now()}`, workflowId:w.id, name, channel:primary, keyword, intent:w.intent, score, status:customerId?'已建档':w.aiConversation?'AI沟通中':'待私信', customerId, owner:agent?agent.name:'AI获客', createdAt:now, nextAction:w.aiConversation?'AI对话沟通并预约客服':'人工复核后私信' };
  Store.acquisitionLeads.unshift(lead);
  Store.outreachLogs.unshift({ id:`ol-acq-${Date.now()}`, campaignId:w.id, customerId:customerId || 'lead', channel:primary, sentTime:now, opened:false, clicked:false, converted:false, status:w.aiConversation?'ai_conversation':'sent', title:w.objective, content:w.dmTemplate, result:w.aiConversation?'AI 已接管公域线索沟通':'已生成公域获客线索，待人工复核', nextFollowAt:'24小时内', ownerId:w.assignAgent, ownerName:agent?agent.name:'AI获客', source:'AI获客工作流', aiConversation:w.aiConversation });
  if(customerId && w.aiConversation){
    Store.conversations.unshift({ id:`conv-acq-${Date.now()}`, customerId, agentId:w.assignAgent||'a1', channelId:toConversationChannel(primary), status:'queued', priority:score>88?'high':'medium', subject:`AI获客线索 · ${w.objective}`, lastMsg:(w.dmTemplate||w.replyTemplate||'AI 获客线索已进入对话').replaceAll('{name}',name).slice(0,100), lastTime:'刚刚', unread:1, slaLeft:85, tags:['AI获客',w.intent], sentiment:'positive', startTime:now });
  }
  w.runs = (w.runs||0) + Math.floor(8 + Math.random()*12);
  w.replies = (w.replies||0) + Math.floor(4 + Math.random()*8);
  w.leads = (w.leads||0) + 1;
  w.crmCreated = (w.crmCreated||0) + (customerId?1:0);
  w.conversions = (w.conversions||0) + (score>93?1:0);
  w.lastRun = '刚刚';
  w.logs = [`${now} 新增线索 ${name}，评分 ${score}`,...(w.logs||[])].slice(0,8);
  if(!silent) toast(`工作流已运行：新增 1 条 ${w.intent} 线索`,'success');
}

function getCallbackStatusTag(status){

function getCallbackTaskStatusTag(status){

function getCallbackTargets(type){

function getCallbackTasks(typeId){

function getCallbackMetrics(){

function createCallbackTask(type, customer, opts={}){
  const due = new Date(Date.now()+(type.slaHours||24)*60*60*1000);
  const task = {
    id:`cbtask-${Date.now()}-${Math.random().toString(16).slice(2,7)}`,
    typeId:type.id,
    customerId:customer.id,
    status:opts.status || (opts.aiConversation?'AI跟进中':'待回访'),
    priority:type.priority,
    channel:opts.channel || type.defaultChannel,
    ownerId:opts.ownerId || 'a1',
    dueAt:opts.dueAt || formatDateTime(due),
    reason:opts.reason || type.trigger,
    nextAction:opts.nextAction || type.goal,
    aiConversation:!!opts.aiConversation,
    createdAt:formatDateTime(new Date()),
    lastResult:opts.lastResult || '已进入回访队列'
  };
  Store.callbackTasks.unshift(task);
  return task;
}
function generateTodayCallbackQueue(){
  let added = 0;
  Store.callbackTypes.filter(t=>t.status==='active').forEach(type=>{
    getCallbackTargets(type).forEach(c=>{

      if(!exists){ createCallbackTask(type, c, { channel:type.defaultChannel, ownerId:'a1', aiConversation:type.aiConversation }); added++; }
    });
  });
  persistStore(); renderOutreach();
  toast(`已生成今日回访队列：新增 ${added} 条任务`,'success');
}

function confirmCallbackRun(typeId){
  const type = getCallbackType(typeId); if(!type) return;

  if(!targets.length){ toast('请选择至少一个回访客户','warn'); return; }

  const ownerId = $('#cbRunOwner')?.value || 'a1';

  const content = ($('#cbRunMessage')?.value || type.script).trim();
  const note = ($('#cbRunNote')?.value || '').trim();

  }

    Store.automationLogs.unshift({ id:`alog-toggle-${Date.now()}`, automationId:a.id, time:formatDateTime(new Date()), customerIds:[], customerNames:[], status:'success', result:`规则「${a.name}」已${a.status==='on'?'启用':'暂停'}`, writes:['自动化日志'], confidence:100 });
    invalidateAutomationCache();
    persistStore();
    renderAutomationSurface();
    toast(`已${a.status==='on'?'启用':'停用'}规则「${a.name}」`,'success');
  }
}

let pendingCampaignImageData = '';
function handleCampaignImagePreview(input){
  const file = input.files && input.files[0];
  if(!file) return;

    pendingCampaignImageData = e.target.result;
    const box = $('#cp-image-preview');
    if(box) box.innerHTML = `<img src="${pendingCampaignImageData}" alt="广告图片预览"/>`;
  };
  reader.readAsDataURL(file);
}

function confirmCreateCampaign(status){
  const name = $('#cp-name').value.trim();
  if(!name){ toast('请填写活动名称','error'); return; }
  const channels = $$('.cp-channel:checked').map(c=>c.value);
  if(!channels.length){ toast('至少选择一个触达渠道','error'); return; }
  const today = new Date().toISOString().slice(0,10);
  const segment = $('#cp-segment').value;
  const targets = getCampaignAudienceCustomers(segment);
  const id = 'cp' + (Store.campaigns.length + 1);
  const sent = status==='running' ? targets.length : 0;
  const imageUrl = $('#cp-image-url').value.trim() || pendingCampaignImageData;
  const campaign = {
    id,
    name,
    channels,
    segment,
    exclude: $('#cp-exclude').value,
    objective: $('#cp-objective').value,
    priority: $('#cp-priority').value,
    creativeType: $('#cp-creative-type').value,
    imageUrl,
    headline: $('#cp-headline').value.trim(),
    cta: $('#cp-cta').value.trim(),
    landingUrl: $('#cp-landing').value.trim(),
    conversionGoal: $('#cp-conversion').value,
    budget: $('#cp-budget').value.trim(),
    frequency: $('#cp-frequency').value,
    quietHours: $('#cp-quiet').value.trim(),
    aiConversation: $('#cp-ai').value === 'on',
    note: $('#cp-note').value.trim(),
    sent,
    opened: Math.floor(sent * 0.58),
    clicked: Math.floor(sent * 0.24),
    converted: Math.floor(sent * 0.06),
    status,
    startDate: $('#cp-start').value || today,
    endDate: $('#cp-end').value || '-',
    content: $('#cp-content').value.trim()
  };
  Store.campaigns.unshift(campaign);
  if(status==='running'){
    const now = formatDateTime(new Date());
    targets.forEach((cu,idx)=>{
      const ch = channels[idx % channels.length];
      Store.outreachLogs.unshift({
        id:`ol-cp-${Date.now()}-${idx}`,
        campaignId:id,
        customerId:cu.id,
        channel:ch,
        sentTime:now,
        opened:false,
        clicked:false,
        converted:false,
        status:campaign.aiConversation?'ai_conversation':'sent',
        title:campaign.objective,
        content:(campaign.content || campaign.headline || name).replaceAll('{name}',cu.name),
        result:campaign.aiConversation?'活动已发送，客户回复后由 AI 先接待':'活动已发送，等待客户响应',
        nextFollowAt:'按活动频控',
        note:campaign.note,
        ownerName:'营销自动化',
        source:'触达中心营销活动',
        aiConversation:campaign.aiConversation
      });
    });
  }
  persistStore();
  pendingCampaignImageData = '';
  closeModal();
  renderOutreach();
  toast(status==='running'?'营销活动已创建并启动':'营销活动已保存为草稿','success');
}
function setCampaignStatus(id,status){
  const c = Store.campaigns.find(x=>x.id===id);
  if(!c) return;
  c.status = status;
  if(status==='running' && c.sent===0){
    c.sent = Math.max(1, Math.floor(Store.customers.length * 18));
    c.opened = Math.floor(c.sent * 0.58);
    c.clicked = Math.floor(c.sent * 0.24);
    c.converted = Math.floor(c.sent * 0.06);
  }
  persistStore();
  renderOutreach();
  renderCampaignDrawer(id);
  toast(status==='running'?'活动已启动':'活动已暂停','success');
}

function inferKnowledgeTags(k){
  const text = [k.title,k.cat,(k.tags||[]).join(',')].join(' ');
  const tags = new Set(Array.isArray(k.tags)?k.tags:[]);
  if(/KYC|认证|实名|护照|地址/.test(text)) ['KYC','实名认证','合规审核'].forEach(t=>tags.add(t));
  if(/出金|入金|到账|支付|银行卡|USDT/.test(text)) ['资金处理','支付SLA','客户安抚'].forEach(t=>tags.add(t));
  if(/黄金|XAU|外汇|EUR|保证金|杠杆|交易/.test(text)) ['CFD交易','风险披露','产品知识'].forEach(t=>tags.add(t));
  if(/MT4|MT5|登录|连接|技术/.test(text)) ['技术排查','平台使用'].forEach(t=>tags.add(t));
  if(/投诉|升级|SOP|异议/.test(text)) ['投诉闭环','主管升级','质检训练'].forEach(t=>tags.add(t));
  if(/AML|反洗钱|合规|风险/.test(text)) ['AML','风险控制','合规话术'].forEach(t=>tags.add(t));
  return Array.from(tags).slice(0,8);
}

function normalizeKnowledgeItem(k, idx=0){
  if(!k) return false;
  let changed = false;
  const set = (key,val)=>{ if(k[key]===undefined || k[key]===null || k[key]===''){ k[key]=val; changed=true; } };
  set('id', `kb${idx+1}`);
  set('cat', '客户服务');
  set('title', '未命名知识');
  set('views', 0);
  set('hit', 0);
  set('rating', 4.8);
  set('langs', ['中']);
  set('updated', '2026-05-19');
  set('author', '知识管理员');
  set('status', 'published');
  set('source', '人工创建');
  set('owner', k.author || '知识管理员');
  set('version', 'v1.0');
  set('riskLevel', /合规|AML|出金|投诉|杠杆|保证金/.test(`${k.title}${k.cat}`) ? 'high' : 'medium');
  set('reviewer', /合规|AML|KYC|出金/.test(`${k.title}${k.cat}`) ? '刘洋' : '王小明');
  set('reviewStatus', k.status==='draft' ? '未提交' : '已审核');
  set('content', buildKnowledgeContent(k));
  set('answerTemplate', `您好，关于「${k.title}」，我已为您匹配到标准处理指引。我们会先核实账户信息，再同步处理时效和下一步动作。`);
  set('vectorStatus', k.status==='draft' ? '未向量化' : '已向量化');
  set('trainingStatus', k.status==='draft' ? '未进入训练集' : '已进入RAG训练集');
  set('aiEnabled', k.status!=='offline');
  set('trainingEnabled', k.status!=='draft' && k.status!=='offline');
  set('modelScope', 'Custom RAG 知识脑-v4');
  set('chunkCount', Math.max(4, Math.ceil(String(k.content||'').length/240)));
  set('tokenCount', Math.max(900, String(k.content||'').length*2));
  set('evalScore', Math.min(99, Math.max(86, Math.round((Number(k.rating)||4.8)*19))));
  set('lastIndexed', k.updated);
  set('compliance', /合规|AML|出金|投诉|杠杆|保证金/.test(`${k.title}${k.cat}`) ? '高风险需人审' : '已通过');
  if(!Array.isArray(k.langs)){ k.langs = ['中']; changed = true; }
  if(!Array.isArray(k.tags)){ k.tags = inferKnowledgeTags(k); changed = true; }
  if(!Array.isArray(k.relatedTicketIds)){
    k.relatedTicketIds = Store.tickets.filter(t=>t.category===k.cat || (t.tags||[]).some(tag=>String(k.title).includes(tag) || String(k.cat).includes(tag))).slice(0,3).map(t=>t.id);
    changed = true;
  }
  if(!Array.isArray(k.auditTrail)){
    k.auditTrail = [
      {time:k.updated, action:'知识发布', by:k.author || '知识管理员', result:'已审核并进入知识库'},
      {time:k.updated, action:'AI向量化', by:'知识脑', result:k.vectorStatus || '已向量化'},
      {time:k.updated, action:'召回评测', by:'RAG评测器', result:`准确率 ${k.evalScore || 94}%`}
    ];
    changed = true;
  }
  if(k.knowledgeVersion !== KNOWLEDGE_VERSION){ k.knowledgeVersion = KNOWLEDGE_VERSION; changed = true; }
  return changed;
}
function ensureKnowledgeBaseIntegrity(){
  let changed = 0;
  (Store.knowledge||[]).forEach((k,i)=>{ if(normalizeKnowledgeItem(k,i)) changed++; });
  if(changed) persistStore();
  return changed;
}
function knowledgeHitRate(k){

  return views ? Math.round(hit/views*100) : 0;
}
function knowledgeStatusTag(k){

  return `<span class="tag ${s[1]}">${s[0]}</span>`;

function knowledgeTrainingTag(k){
  const ok = k.aiEnabled && k.trainingEnabled && k.vectorStatus==='已向量化';
  return `<span class="tag ${ok?'green':k.status==='review'?'amber':'gray'}">${ok?'AI可召回/训练':k.status==='review'?'待审后训练':'未训练'}</span>`;
}
function getKnowledgeStats(){
  const total = Store.knowledge.length || 1;
  const published = Store.knowledge.filter(k=>k.status==='published').length;
  const vectorized = Store.knowledge.filter(k=>k.vectorStatus==='已向量化').length;
  const trainable = Store.knowledge.filter(k=>k.aiEnabled && k.trainingEnabled).length;
  const hitRate = Store.knowledge.reduce((s,k)=>s+(Number(k.hit)||0),0) / Math.max(1,Store.knowledge.reduce((s,k)=>s+(Number(k.views)||0),0));
  return {total,published,vectorized,trainable,hitRate:Math.round(hitRate*100)};
}

function getSopStats(){
  const list = getSopLibrary();
  const activeRuns = Store.sopRuns.filter(r=>r.status!=='已完成').length;
  const critical = list.filter(s=>s.priority==='critical').length;
  const auto = list.filter(s=>s.automation).length;
  const avg = Math.round(list.reduce((sum,s)=>sum+s.success,0)/list.length);
  return {total:list.length,activeRuns,critical,auto,avg};
}
function shortSopSla(sla){
  const text = String(sla||'');
  const hit = text.match(/实时|\d+\s*(分钟|小时|个工作日|天)/);
  return hit ? hit[0] : text.slice(0,8);
}
function getFilteredSops(){
  const q = sopSearchText.trim().toLowerCase();
  return getSopLibrary().filter(s=>{
    const hay = [s.title,s.category,s.trigger,s.goal,s.owner,s.steps.map(st=>st.name).join(' ')].join(' ').toLowerCase();
    const matchQ = !q || hay.includes(q);
    const matchCat = sopCategoryFilter==='all' || s.category===sopCategoryFilter;
    const matchStatus = sopStatusFilter==='all' || (sopStatusFilter==='automation' && s.automation) || (sopStatusFilter==='critical' && s.priority==='critical');
    return matchQ && matchCat && matchStatus;
  });

    return `<div class="card">

        <thead><tr><th>工单号</th><th>标题</th><th>客户</th><th>分类</th><th>优先级</th><th>状态</th><th>负责人</th><th>SLA</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody>${Store.tickets.map(t=>{
          const cu=findCustomer(t.customerId); const ag=findAgent(t.assignee);
          return `<tr onclick="openTicket('${t.id}')">

            <td><b>${t.title}</b><br>${t.tags.slice(0,2).map(tg=>`<span class="tag gray">${tg}</span>`).join(' ')}</td>
            <td><div class="row"><div class="avatar ${cu.av}" style="width:28px;height:28px;font-size:11px">${cu.avatar}</div>${cu.name}</div></td>
            <td><span class="tag blue">${t.category}</span></td>
            <td><span class="tag ${t.priority==='critical'?'red':t.priority==='high'?'amber':'gray'}">${t.priority==='critical'?'紧急':t.priority==='high'?'高':t.priority==='medium'?'中':'低'}</span></td>
            <td><span class="tag ${t.status==='resolved'?'green':t.status==='new'?'blue':t.status==='waiting'?'amber':'purple'}">${t.status==='new'?'新建':t.status==='in_progress'?'处理中':t.status==='waiting'?'等待':t.status==='resolved'?'已解决':'已关闭'}</span></td>
            <td>${ag?`<div class="row"><div class="avatar ${ag.av}" style="width:24px;height:24px;font-size:10px">${ag.avatar}</div>${ag.name}</div>`:'<span class="tag amber">未分配</span>'}</td>
            <td><div class="sla-bar ${t.sla<30?'danger':t.sla<60?'warn':''}" style="width:60px"><div style="width:${t.sla}%"></div></div><small style="color:var(--t3)">${t.sla}%</small></td>
            <td style="font-size:11.5px;color:var(--t3)">${t.createdAt}</td>
            <td><button class="btn ghost" style="padding:3px 8px" onclick="event.stopPropagation();openTicket('${t.id}')">查看</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }
  if(ticketTab==='knowledge'){
    return renderKnowledgeContent();

  if(ticketTab==='sop'){
    return renderSopContent();
  }
  if(ticketTab==='objection'){
    return renderObjectionContent();
  }
}

function getObjectionStats(){
  const list = getObjectionLibrary();
  const critical = list.filter(o=>o.priority==='critical').length;
  const avgWin = Math.round(list.reduce((s,o)=>s+o.winRate,0)/list.length);
  const aiHigh = list.filter(o=>o.confidence>=94).length;
  const active = Store.objectionRuns.filter(r=>r.status!=='已闭环').length;
  return {total:list.length,critical,avgWin,aiHigh,active};
}
function getFilteredObjections(){
  const q = objectionSearchText.trim().toLowerCase();
  return getObjectionLibrary().filter(o=>{
    const hay = [o.quote,o.category,o.stage,o.diagnosis,o.trigger,o.tags.join(' '),o.scripts.empathy,o.scripts.value].join(' ').toLowerCase();
    const matchQ = !q || hay.includes(q);
    const matchCat = objectionCategoryFilter==='all' || o.category===objectionCategoryFilter;
    const matchStage = objectionStageFilter==='all' || o.stage===objectionStageFilter || (objectionStageFilter==='critical' && o.priority==='critical');
    return matchQ && matchCat && matchStage;
  });
}

function getObjectionRelatedKnowledge(o){

function sendObjectionDraft(id){

  if(!customer){ toast('没有可写回的客户','warn'); return; }
  const channel = getFieldValue('ob-channel') || customer.channel || 'web';

  const now = nowText();
  customer.tags = Array.from(new Set([...(customer.tags||[]),'异议处理',o.category,o.stage,...(o.tags||[]).slice(0,2)]));
  Store.outreachLogs.unshift({ id:`obreach-${Date.now()}`, campaignId:'objection-ai', customerId:customer.id, channel, sentTime:now, opened:true, clicked:o.priority!=='critical', converted:false, source:'异议处理库', aiConversation:!!$('#obOptConv')?.checked, message:text, objectionId:o.id, result:'AI话术已发送并等待客户反馈' });

    if(!conv){
      conv = { id:`conv-ob-${Date.now()}`, customerId:customer.id, agentId:(Store.agents.find(a=>a.name===o.owner)||Store.agents[1]||{}).id||null, channelId:channel, status:'open', priority:o.priority==='critical'?'critical':o.priority==='high'?'high':'medium', subject:`异议处理：${o.category}`, lastMsg:text.slice(0,90), lastTime:'刚刚', unread:0, slaLeft:o.priority==='critical'?20:60, tags:['AI对话','异议处理',o.category], sentiment:o.priority==='critical'?'negative':'neutral', startTime:now };
      Store.conversations.unshift(conv);
    }else{
      conv.status='open';
      conv.lastMsg=text.slice(0,90);
      conv.lastTime='刚刚';
      conv.tags = Array.from(new Set([...(conv.tags||[]),'AI对话','异议处理',o.category]));
    }
  }
  let ticket = Store.tickets.find(t=>t.customerId===customer.id && t.tags?.includes('异议处理') && t.status!=='resolved');
  if($('#obOptTicket')?.checked || o.priority==='critical'){
    if(!ticket){
      const nextNo = String(Store.tickets.length+1).padStart(3,'0');
      ticket = { id:`TK-OB-${nextNo}`, conversationId:conv?.id||null, customerId:customer.id, title:`异议跟进：${o.category}`, status:'in_progress', priority:o.priority==='critical'?'critical':'high', assignee:(Store.agents.find(a=>a.name===o.owner)||Store.agents[1]||{}).id||null, category:'异议处理', sla:o.priority==='critical'?30:90, createdAt:now, tags:['异议处理',o.category,o.stage], description:`客户异议：${o.quote}\n处理原则：${o.principle}\nAI回复：${text.slice(0,260)}` };
      Store.tickets.unshift(ticket);
    }else{
      ticket.tags = Array.from(new Set([...(ticket.tags||[]),'异议处理',o.category,o.stage]));
      ticket.description = `${ticket.description||''}\n\n${now} AI异议回复：${text.slice(0,260)}`;
    }
    if(o.relatedSopId) ticket.sopId = o.relatedSopId;
  }
  if($('#obOptCallback')?.checked){
    Store.callbackTasks.unshift({ id:`cb-ob-${Date.now()}`, typeId:`objection-${o.id}`, customerId:customer.id, status:'待回访', priority:o.priority==='critical'?'urgent':o.priority, channel, ownerId:(Store.agents.find(a=>a.name===o.owner)||Store.agents[1]||{}).id||null, dueAt:o.priority==='critical'?'30分钟内':'24小时内', reason:`异议处理：${o.category}`, nextAction:o.nextBestAction, aiConversation:!!$('#obOptConv')?.checked, createdAt:now, lastResult:'由异议处理库AI生成' });
  }
  const writes = ['触达日志','客户标签'];
  if(conv) writes.push('AI会话');
  if(ticket) writes.push('工单');
  if($('#obOptCallback')?.checked) writes.push('回访任务');
  if($('#obOptTraining')?.checked) writes.push('AI训练样本');
  Store.objectionRuns.unshift({ id:`orun-${Date.now()}`, objectionId:o.id, customerId:customer.id, ticketId:ticket?.id||null, channel, status:o.priority==='critical'?'主管关注':'已触达', confidence:o.confidence, stage:o.stage, owner:o.owner, createdAt:now, result:`AI话术已发送，下一步：${o.nextBestAction}`, writes });
  Store.automationLogs.unshift({ id:`alog-ob-${Date.now()}`, automationId:'objection-ai', time:now, customerIds:[customer.id], customerNames:[customer.name], status:'success', result:`异议「${o.category}」已发送话术并写回 ${writes.join('、')}`, writes, confidence:o.confidence });
  persistStore();
  closeModal();
  if(ticketTab==='objection') renderTickets();
  toast(`已向 ${customer.name} 发送异议回复并写回闭环`,'success');
}

function startSopRun(sopId){
  const s = getSopLibrary().find(x=>x.id===sopId); if(!s) return;
  const matchedTicket = Store.tickets.find(t=>t.status!=='resolved' && (s.category.includes(t.category)||t.category.includes(s.category.slice(0,2))||(t.tags||[]).some(tag=>s.title.includes(tag)||s.category.includes(tag)))) || Store.tickets.find(t=>t.status!=='resolved') || Store.tickets[0];
  const run = { id:`srun-${Date.now()}`, sopId, ticketId:matchedTicket?.id||'未关联', customerId:matchedTicket?.customerId||null, status:'执行中', progress:1, total:s.stepCount, owner:s.owner, startedAt:nowText(), lastAction:`已启动「${s.title}」第1步：${s.steps[0].name}`, writes:['SOP执行记录','工单时间线','自动化日志'] };
  Store.sopRuns.unshift(run);
  if(matchedTicket){
    matchedTicket.sopId = sopId;
    matchedTicket.tags = Array.from(new Set([...(matchedTicket.tags||[]),'SOP执行中',s.category]));
    matchedTicket.status = matchedTicket.status==='new' ? 'in_progress' : matchedTicket.status;
  }
  Store.automationLogs.unshift({ id:`alog-sop-${Date.now()}`, automationId:'sop-workflow', time:nowText(), customerIds:run.customerId?[run.customerId]:[], customerNames:run.customerId?[findCustomer(run.customerId)?.name||'未知客户']:[], status:'success', result:`启动SOP：${s.title}，关联工单 ${run.ticketId}`, writes:run.writes, confidence:s.success });
  persistStore();
  toast(`已启动 ${s.title}，关联 ${run.ticketId}`,'success');
  openSop(sopId);
}
function completeSopStep(sopId, idx){
  const s = getSopLibrary().find(x=>x.id===sopId); if(!s) return;
  let run = Store.sopRuns.find(r=>r.sopId===sopId && r.status!=='已完成');
  if(!run){
    startSopRun(sopId);
    run = Store.sopRuns.find(r=>r.sopId===sopId && r.status!=='已完成');
  }
  run.progress = Math.max(run.progress||0, idx+1);
  run.total = s.stepCount;
  run.lastAction = `完成第${idx+1}步：${s.steps[idx].name}`;
  run.status = run.progress >= run.total ? '已完成' : '执行中';
  run.writes = Array.from(new Set([...(run.writes||[]), ...s.steps[idx].writes]));
  const t = findTicket(run.ticketId);
  if(t){
    t.sopProgress = `${run.progress}/${run.total}`;
    t.tags = Array.from(new Set([...(t.tags||[]), run.status==='已完成'?'SOP已闭环':'SOP执行中']));
    if(run.status==='已完成' && t.status!=='resolved') t.status='waiting';
  }
  Store.automationLogs.unshift({ id:`alog-sop-step-${Date.now()}`, automationId:'sop-step', time:nowText(), customerIds:run.customerId?[run.customerId]:[], customerNames:run.customerId?[findCustomer(run.customerId)?.name||'未知客户']:[], status:'success', result:run.lastAction, writes:s.steps[idx].writes, confidence:96 });
  persistStore();
  toast(run.status==='已完成'?'SOP全部步骤已闭环':'步骤已执行并写回','success');
  openSop(sopId);
}

}

  Store.knowledge.unshift(item);

function renderKBList(text=''){
  const q = (text || knowledgeSearchText || '').trim().toLowerCase();
  const list = Store.knowledge.filter(k=>{
    const hay = [k.title,k.cat,k.content,k.answerTemplate,(k.tags||[]).join(' '),(k.langs||[]).join(' ')].join(' ').toLowerCase();
    const matchQ = !q || hay.includes(q);
    const matchCat = knowledgeCategoryFilter==='all' || k.cat===knowledgeCategoryFilter;
    const matchStatus = knowledgeStatusFilter==='all' || k.status===knowledgeStatusFilter;
    return matchQ && matchCat && matchStatus;
  });
  if(!list.length) return '<tr><td colspan="9"><div class="no-data">无结果</div></td></tr>';
  return list.map(k=>`<tr onclick="openKnowledge('${k.id}')">
    <td><b>${esc(k.title)}</b><br><small style="color:var(--t3)">版本 ${esc(k.version)} · ${esc(k.source)} · ${esc(k.modelScope)}</small></td>
    <td><span class="tag blue">${esc(k.cat)}</span><br><div class="flex mt-s" style="flex-wrap:wrap;gap:4px">${(k.tags||[]).slice(0,3).map(t=>`<span class="tag gray">#${esc(t)}</span>`).join('')}</div></td>
    <td>${knowledgeStatusTag(k)}<br><small style="color:var(--t3)">${esc(k.reviewStatus)} · ${esc(k.compliance)}</small></td>
    <td>${knowledgeTrainingTag(k)}<br><small style="color:var(--t3)">${esc(k.vectorStatus)} · ${fmtNum(k.chunkCount)} chunks</small></td>
    <td><b style="color:var(--green)">${knowledgeHitRate(k)}%</b><br><small style="color:var(--t3)">${fmtNum(k.hit)} 命中 / ${fmtNum(k.views)} 查看 · ⭐ ${k.rating}</small></td>
    <td>${(k.relatedTicketIds||[]).slice(0,3).map(id=>`<span class="tag purple" onclick="event.stopPropagation();openTicket('${id}')">${id}</span>`).join(' ') || '<span class="tag gray">未关联</span>'}</td>

    <td><button class="btn ghost" style="padding:3px 8px" onclick="event.stopPropagation();openKnowledge('${k.id}')">详情</button><button class="btn ghost" style="padding:3px 8px" onclick="event.stopPropagation();openAddKnowledge('${k.id}')">编辑</button></td>
