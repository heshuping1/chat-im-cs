function resolveTicket(id){
  const t = findTicket(id);
  if(t){ t.status='resolved'; t.sla=100; }
  persistStore();
  closeDrawer(); updateBadges();
  toast(`工单 ${id} 已标记为已解决`,'success');
  renderTickets();
}

function openCreateTicket(){
  openModal(`
    <div class="modal-head"><h2>+ 新建工单</h2><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>标题 <span class="req">*</span></label><input id="tk-title" placeholder="简要描述问题..."/></div>
      <div class="field-row">
        <div class="field"><label>关联客户 <span class="req">*</span></label><select id="tk-cust">${Store.customers.map(c=>`<option value="${c.id}">${c.name} · ${c.tier}</option>`).join('')}</select></div>
        <div class="field"><label>分类</label><select id="tk-cat"><option>出入金</option><option>账户管理</option><option>技术支持</option><option>交易</option><option>投诉处理</option><option>风控</option><option>其他</option></select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>优先级</label><select id="tk-prio"><option>medium</option><option>high</option><option>critical</option><option>low</option></select></div>
        <div class="field"><label>负责人</label><select id="tk-ag"><option value="">未分配</option>${Store.agents.map(a=>`<option value="${a.id}">${a.name} · ${a.team}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>详细描述</label><textarea id="tk-desc" rows="4"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="confirmCreateTicket()">创建工单</button>
    </div>
  `);
}
function confirmCreateTicket(){
  const title = $('#tk-title').value.trim();
  if(!title){ toast('请填写标题','error'); return; }
  const id = `TK-${String(Store.tickets.length+1).padStart(3,'0')}`;
  Store.tickets.push({ id, conversationId:null, customerId:$('#tk-cust').value, title, status:'new', priority:$('#tk-prio').value, assignee:$('#tk-ag').value||null, category:$('#tk-cat').value, sla:100, createdAt:new Date().toLocaleString('zh-CN'), tags:[], description:$('#tk-desc').value });
  persistStore();
  closeModal(); updateBadges();
  toast(`工单 ${id} 已创建`,'success');
  renderTickets();
}

  k.views = (Number(k.views)||0) + 1;
  persistStore();
  const relTickets = (k.relatedTicketIds||[]).map(findTicket).filter(Boolean);
  const contentHtml = esc(k.content||buildKnowledgeContent(k)).replace(/\n/g,'<br>');

  openDrawer(`
    <div class="drawer-head">

function confirmAddKnowledge(id='', mode='published'){
  const title = getFieldValue('kb-title');
  const cat = getFieldValue('kb-cat');
  const content = getFieldValue('kb-content');
  if(!title){ toast('请填写知识标题','error'); return; }
  if(!content && mode!=='draft'){ toast('发布知识必须填写正文内容','error'); return; }
  const existing = id ? Store.knowledge.find(k=>k.id===id) : null;
  const now = nowText();
  const tags = getFieldValue('kb-tags').split(/[，,、\s]+/).map(s=>s.trim()).filter(Boolean);
  const langs = getCheckedValues('.kb-lang');
  const relatedTicketIds = getCheckedValues('.kb-ticket');
  const aiEnabled = !!$('#kb-rag')?.checked;
  const trainingEnabled = !!$('#kb-train')?.checked && mode==='published';
  const riskLevel = getFieldValue('kb-risk');
  const reviewRequired = !!$('#kb-review-required')?.checked || riskLevel==='high';
  const record = existing || {};
  const priorVersion = String(record.version||'v0.9').replace(/[^\d.]/g,'') || '0.9';
  const nextVersion = existing ? `v${(parseFloat(priorVersion)+0.1).toFixed(1)}` : 'v1.0';
  Object.assign(record, {
    id: existing ? existing.id : `kb${Date.now().toString(36)}`,
    cat,
    title,
    status: mode,
    source: getFieldValue('kb-source') || '人工创建',
    author: existing?.author || getFieldValue('kb-owner') || '知识管理员',
    owner: getFieldValue('kb-owner') || '知识管理员',
    reviewer: getFieldValue('kb-reviewer') || '刘洋',
    riskLevel,
    reviewStatus: mode==='draft' ? '未提交' : reviewRequired ? '待合规复核' : '已审核',
    content,
    answerTemplate: getFieldValue('kb-answer') || `您好，关于「${title}」，我已为您匹配到标准处理指引。`,
    tags: tags.length ? Array.from(new Set(tags)) : inferKnowledgeTags({title,cat,tags:[]}),
    langs: langs.length ? langs : ['中'],
    relatedTicketIds,
    aiEnabled,
    trainingEnabled,
    vectorStatus: aiEnabled && mode==='published' ? '已向量化' : '未向量化',
    trainingStatus: trainingEnabled ? '已进入RAG训练集' : mode==='published' ? '仅RAG召回' : '未进入训练集',
    modelScope: 'Custom RAG 知识脑-v4',
    chunkCount: Math.max(4, Math.ceil(content.length/240)),
    tokenCount: Math.max(900, content.length*2),
    evalScore: existing?.evalScore || (reviewRequired ? 92 : 96),
    compliance: reviewRequired ? '高风险需人审' : '已通过',
    updated: now,
    lastIndexed: aiEnabled && mode==='published' ? now : (existing?.lastIndexed || '未索引'),
    version: nextVersion,
    views: existing?.views || 0,
    hit: existing?.hit || 0,
    rating: existing?.rating || 4.8,
    knowledgeVersion: KNOWLEDGE_VERSION
  });
  record.auditTrail = Array.isArray(record.auditTrail) ? record.auditTrail : [];
  record.auditTrail.unshift({time:now, action: existing?'知识更新':'知识创建', by:record.owner, result: mode==='published'?'已发布并写入RAG/训练闭环':mode==='review'?'已提交审核':'已保存草稿'});
  if(trainingEnabled){
    Store.automationLogs.unshift({ id:`alog-kb-${Date.now()}`, automationId:'knowledge-training', time:now, customerIds:[], customerNames:[], status:'success', result:`知识「${title}」已进入 ${record.modelScope}`, writes:['知识库','向量索引','AI训练集','工单关联'], confidence:record.evalScore });
  }
  relatedTicketIds.forEach(tid=>{
    const t = findTicket(tid);
    if(t){
      t.knowledgeIds = Array.from(new Set([...(t.knowledgeIds||[]), record.id]));
      t.tags = Array.from(new Set([...(t.tags||[]),'知识已关联']));
    }
  });
  if(!existing) Store.knowledge.unshift(record);
  persistStore();
  closeModal();
  ticketTab = 'knowledge';
  renderTickets();
  updateBadges();
  toast(mode==='published'?'知识已发布、向量化并进入AI训练闭环':mode==='review'?'知识已提交审核':'知识草稿已保存','success');
}

function pushKnowledgeAudit(k, action, result, by='知识脑'){
  k.auditTrail = Array.isArray(k.auditTrail) ? k.auditTrail : [];
  k.auditTrail.unshift({time:nowText(), action, by, result});
}
function reindexKnowledge(id){
  const k = Store.knowledge.find(x=>x.id===id); if(!k) return;
  normalizeKnowledgeItem(k, Store.knowledge.indexOf(k));
  k.vectorStatus = '已向量化';
  k.aiEnabled = true;
  k.lastIndexed = nowText();
  k.chunkCount = Math.max(4, Math.ceil(String(k.content||'').length/220));
  k.tokenCount = Math.max(900, String(k.content||'').length*2);
  k.evalScore = Math.min(99, (Number(k.evalScore)||94)+1);
  pushKnowledgeAudit(k,'重新向量化',`生成 ${k.chunkCount} 个 chunks，评测 ${k.evalScore}%`);
  persistStore();
  openKnowledge(id);
  toast('已重新向量化并更新RAG索引','success');
}
function trainKnowledge(id){
  const k = Store.knowledge.find(x=>x.id===id); if(!k) return;
  normalizeKnowledgeItem(k, Store.knowledge.indexOf(k));
  if(k.compliance==='高风险需人审' && k.reviewStatus!=='已审核'){
    k.reviewStatus = '待合规复核';
    pushKnowledgeAudit(k,'训练拦截','高风险知识需审核后进入训练集','合规规则');
    persistStore();
    openKnowledge(id);
    toast('高风险知识已进入合规复核，审核后再训练','warn');
    return;
  }
  k.trainingEnabled = true;
  k.aiEnabled = true;
  k.vectorStatus = '已向量化';
  k.trainingStatus = '已进入RAG训练集';
  k.lastIndexed = nowText();
  pushKnowledgeAudit(k,'加入训练集','已脱敏并写入客服陪练/意图分类/RAG评测样本');
  Store.automationLogs.unshift({ id:`alog-kb-${Date.now()}`, automationId:'knowledge-training', time:nowText(), customerIds:[], customerNames:[], status:'success', result:`知识「${k.title}」已加入AI训练集`, writes:['知识库','训练数据','RAG索引'], confidence:k.evalScore||96 });
  persistStore();
  openKnowledge(id);
  toast('已加入AI训练数据集','success');
}
function runKnowledgeRetrievalTest(id){
  const k = Store.knowledge.find(x=>x.id===id); if(!k) return;
  normalizeKnowledgeItem(k, Store.knowledge.indexOf(k));
  k.hit = (Number(k.hit)||0) + 12;
  k.views = (Number(k.views)||0) + 15;
  k.evalScore = Math.min(99, (Number(k.evalScore)||94)+1);
  pushKnowledgeAudit(k,'召回测试',`测试问题 15 条，命中 12 条，综合准确率 ${k.evalScore}%`);
  persistStore();
  openKnowledge(id);
  toast('召回测试完成，命中结果已回写','success');
}
function generateKnowledgeTranslations(id){
  const k = Store.knowledge.find(x=>x.id===id); if(!k) return;
  ['英','阿'].forEach(l=>{ if(!k.langs.includes(l)) k.langs.push(l); });
  pushKnowledgeAudit(k,'多语言生成','已生成英/阿语草稿，等待人工复核');
  persistStore();
  openKnowledge(id);
  toast('已生成多语言草稿并进入复核','success');
}
function toggleKnowledgeOffline(id){
  const k = Store.knowledge.find(x=>x.id===id); if(!k) return;
  if(k.status==='offline'){
    k.status='published'; k.aiEnabled=true; k.trainingEnabled=true; k.vectorStatus='已向量化'; k.trainingStatus='已进入RAG训练集';
    pushKnowledgeAudit(k,'重新发布','已恢复召回和训练可用状态');
    toast('知识已重新发布','success');
  }else{
    k.status='offline'; k.aiEnabled=false; k.trainingEnabled=false; k.trainingStatus='已从训练集暂停'; k.vectorStatus='已下线';
    pushKnowledgeAudit(k,'知识下线','已从客服召回和AI训练中暂停');
    toast('知识已下线并暂停AI召回','warn');
  }
  k.updated = nowText();
  persistStore();
  openKnowledge(id);
}
function runKnowledgeTrainingBatch(){
  ensureKnowledgeBaseIntegrity();
  let changed = 0;
  Store.knowledge.forEach(k=>{
    if(k.status==='published'){
      k.aiEnabled = true;
      k.vectorStatus = '已向量化';
      k.lastIndexed = nowText();
      if(k.compliance!=='高风险需人审' || k.reviewStatus==='已审核'){
        k.trainingEnabled = true;
        k.trainingStatus = '已进入RAG训练集';
      }
      pushKnowledgeAudit(k,'批量重建索引','已刷新向量索引与训练状态');
      changed++;
    }
  });
  persistStore();
  renderTickets();
  toast(`已重建 ${changed} 条知识的AI索引`,'success');
}

function draftTicketReply(ticketId){

  const kb = linked || Store.knowledge.find(k=>k.cat===t.category) || Store.knowledge[0];
  if(!kb){ toast('暂无可用知识','warn'); return; }
  kb.hit = (Number(kb.hit)||0) + 1;
  if(!kb.relatedTicketIds?.includes(t.id)) kb.relatedTicketIds = Array.from(new Set([...(kb.relatedTicketIds||[]), t.id]));
  const cu = findCustomer(t.customerId);
  const txt = `${cu?.name||'您好'}，关于您反馈的「${t.title}」，我们已根据「${kb.title}」的标准处理流程进行核实。\n\n${kb.answerTemplate}\n\n下一步：我们会继续同步处理进度；若涉及资金、认证或风险复核，会由对应专员优先跟进。`;
  const area = $('#ticketReply');
  if(area) area.value = txt;
  persistStore();
  toast('AI已基于知识库起草回复','success');
}

  if(!msg){ toast('请输入要发送的内容','error'); return; }
  t.externalReplies = Array.isArray(t.externalReplies) ? t.externalReplies : [];
  t.externalReplies.push({time:nowText(), by:findAgent(t.assignee)?.name || '客服', text:msg, channel:'站内信/邮件同步', status:'已发送'});
  t.status = t.status==='new' ? 'in_progress' : t.status;
  t.tags = Array.from(new Set([...(t.tags||[]),'已回复客户']));
  persistStore();
  openTicket(ticketId,'external');
  toast('客户回复已发送，并写入工单时间线','success');
}

  return brain.capabilities.map((name,i)=>({

    action: bp.outputs[i % bp.outputs.length],
    write: ['客户画像','AI会话','触达日志','自动化日志','数据报表'][i % 5],

}

function ensureAIBrainIntegrity(){
  const target = 26;
  let total = Store.aiBrains.reduce((s,b)=>s+(b.capabilities||[]).length,0);
  const compliance = Store.aiBrains.find(b=>b.id==='b6');
  while(total > target && compliance && compliance.capabilities.length > 4){
    compliance.capabilities.pop();
    total--;
  }
}

function trainBrain(id, abilityName=''){
  const b = Store.aiBrains.find(x=>x.id===id); if(!b) return;
  if(abilityName) return trainBrainCapability(id, abilityName);
  const bp = getBrainBlueprint(id);
  const plan = getCapabilityTrainingPlan(b, `${b.name}全能力`);
  aiActiveTrainingPlan = plan;
  b.trainingJobs = b.trainingJobs || [];
  b.trainingJobs.unshift({ id:plan.planId, ability:plan.abilityName, time:nowText(), samples:plan.sampleCount, status:'排队中', target:plan.targetMetric });
  Store.automationLogs.unshift({ id:`alog-ai-train-${Date.now()}`, automationId:`ai-brain-${id}-training`, time:nowText(), customerIds:[], customerNames:[], status:'success', result:`${b.name}已进入全脑重训队列，数据集：${bp.datasets.join('、')}`, writes:['训练队列','样本脱敏','离线评测','灰度发布计划','自动化日志'], confidence:99 });
  persistStore();
  toast(`${b.name} 已加入训练队列`,'success');
  openBrain(id,'eval');
}

function runAICommandScenario(){
  const scenario = getScenarioById(aiCommandScenario);
  scenario.chain.forEach((id,i)=>runBrainScenario(id, {silent:true, scenario, step:i}));
  toast(`已运行「${scenario.name}」AI作战链路，并完成多大脑写回`,'success');
  const n = $('#aiContent'); if(n) n.innerHTML = renderAIContent();
}
function runBrainScenario(id, opts={}){
  const b = Store.aiBrains.find(x=>x.id===id); if(!b) return;
  const bp = getBrainBlueprint(id);
  const scenario = opts.scenario || getAICommandScenarios().find(s=>s.chain.includes(id)) || getScenarioById(aiCommandScenario);
  const cu = findCustomer(scenario.customerId) || pickBrainCustomer(id);
  const now = nowText();
  const writes = ['客户画像','自动化日志'];
  if(['b1','b5'].includes(id)){ writes.push('触达日志','回访任务'); }
  if(['b2','b3'].includes(id)){ writes.push('AI会话'); }
  if(['b4','b6'].includes(id)){ writes.push('工单','SOP建议'); }
  if(id==='b3') writes.push('异议处理记录');
  if(cu) cu.tags = Array.from(new Set([...(cu.tags||[]),'AI协同',b.name,scenario.name]));
  if(cu && writes.includes('AI会话')){
    Store.conversations.unshift({ id:`conv-ai-${Date.now()}-${id}`, customerId:cu.id, agentId:null, channelId:cu.channel||'web', status:'open', priority:scenario.risk==='high'?'critical':'medium', subject:`${b.name}：${scenario.name}`, lastMsg:`${b.name}已完成判断：${scenario.objective}`, lastTime:'刚刚', unread:0, slaLeft:scenario.risk==='high'?20:60, tags:['AI协同',b.name], sentiment:scenario.risk==='high'?'negative':'neutral', startTime:now });
  }
  if(cu && writes.includes('触达日志')){
    Store.outreachLogs.unshift({ id:`ol-ai-${Date.now()}-${id}`, campaignId:`ai-command-${scenario.id}`, customerId:cu.id, channel:cu.channel||'web', sentTime:now, opened:true, clicked:id==='b1', converted:false, source:`AI大脑协同-${b.name}`, aiConversation:true, message:`${scenario.name}：${scenario.objective}` });
  }
  if(cu && writes.includes('回访任务')){
    Store.callbackTasks.unshift({ id:`cb-ai-${Date.now()}-${id}`, typeId:`ai-brain-${id}`, customerId:cu.id, status:'AI跟进中', priority:scenario.risk==='high'?'urgent':'medium', channel:cu.channel||'web', ownerId:null, dueAt:scenario.risk==='high'?'30分钟内':'24小时内', reason:`${b.name}：${scenario.name}`, nextAction:scenario.objective, aiConversation:true, createdAt:now, lastResult:'由AI大脑协同作战平台生成' });
  }
  if(cu && writes.includes('工单')){
    Store.tickets.unshift({ id:`TK-AI-${Date.now().toString().slice(-5)}-${id}`, conversationId:null, customerId:cu.id, title:`${b.name}：${scenario.name}`, status:'in_progress', priority:scenario.risk==='high'?'critical':'high', assignee:null, category:id==='b6'?'合规风控':'AI协同', sla:scenario.risk==='high'?30:90, createdAt:now, tags:['AI协同',b.name,scenario.name], description:`场景：${scenario.trigger}\n目标：${scenario.objective}\n守护边界：${bp.guardrails.join('；')}` });
  }
  if(id==='b3' && Store.objectionRuns && cu){
    Store.objectionRuns.unshift({ id:`orun-ai-${Date.now()}`, objectionId:'deposit-hesitation', customerId:cu.id, ticketId:null, channel:cu.channel||'web', status:'AI处理中', confidence:b.accuracy, stage:'转化推进', owner:bp.owner, createdAt:now, result:`${b.name}在「${scenario.name}」中识别并处理异议`, writes:['客户标签','AI会话','回访任务'] });
  }
  Store.automationLogs.unshift({ id:`alog-ai-command-${Date.now()}-${id}`, automationId:`ai-brain-${id}`, time:now, customerIds:cu?[cu.id]:[], customerNames:cu?[cu.name]:[], status:'success', result:`${b.name}完成「${scenario.name}」第 ${(opts.step??0)+1} 步：${bp.outputs[0]}`, writes, confidence:b.accuracy });
  persistStore();
  if(!opts.silent){
    toast(`${b.name} 已完成一次可追溯闭环`,'success');
    openBrain(id,'log');
  }
}

function getAICapabilityFlowItems(){
  ensureAIBrainIntegrity();
  const seed = getAICapabilityFlowSeed();
  const stages = {b1:'获客', b2:'对话', b3:'转化', b4:'服务', b5:'复购', b6:'合规'};
  let order = 0;
  return Store.aiBrains.flatMap((brain, brainIndex)=>(brain.capabilities||[]).map((name, abilityIndex)=>{
    const bp = getBrainBlueprint(brain.id);
    const meta = seed[name] || {};
    order += 1;
    return {
      order,
      brainId:brain.id,
      brainName:brain.name,
      brainIcon:brain.icon,
      brainColor:brain.color,
      name,
      stage:meta.stage || stages[brain.id] || '对话',
      plain:meta.plain || `${brain.name}会读取相关信号，判断客户当前状态，并生成下一步建议。`,
      input:meta.input || bp.signals[abilityIndex % bp.signals.length],
      action:meta.action || bp.outputs[abilityIndex % bp.outputs.length],
      output:meta.output || bp.outputs[(abilityIndex+1) % bp.outputs.length],
      writeback:meta.writeback || ['客户画像','AI会话','触达日志','工单/SOP','训练评测'][abilityIndex % 5],
      next:meta.next || '交给下一步大脑继续处理',
      risk:meta.risk || bp.guardrails[0],
      mode:meta.mode || getBrainHealth(brain).autonomy,
      metric:Math.max(82, Math.min(99, brain.accuracy + (abilityIndex % 3) - 1)),
      indexInBrain:abilityIndex,
      brainIndex
    };
  }));
}
function findAICapabilityFlowItem(name){
  return getAICapabilityFlowItems().find(x=>x.name===name) || getAICapabilityFlowItems()[0];
}

  if(cu) cu.tags = Array.from(new Set([...(cu.tags||[]),'AI能力闭环',item.stage,item.name]));
  Store.automationLogs.unshift({
    id:`alog-ai-cap-${Date.now()}`,
    automationId:`ai-brain-${item.brainId}-capability-flow`,
    time:now,
    customerIds:cu?[cu.id]:[],
    customerNames:cu?[cu.name]:[],
    status:'success',

/* ===================== 全局搜索（真实可用） ===================== */
function setupGlobalSearch(){
  const inp = document.getElementById('globalSearch');
  const pop = document.getElementById('searchPop');
  if(!inp || !pop) return;
  inp.addEventListener('input',()=>{
    const q = inp.value.trim().toLowerCase();
    if(!q){ pop.classList.remove('show'); return; }
    const hitCustomers = Store.customers.filter(c=>c.name.toLowerCase().includes(q)||c.en.toLowerCase().includes(q)||c.phone.includes(q)||c.email.toLowerCase().includes(q)).slice(0,4);
    const hitAgents = Store.agents.filter(a=>a.name.toLowerCase().includes(q)||a.en.toLowerCase().includes(q)||a.email.toLowerCase().includes(q)).slice(0,4);
    const hitConvs  = Store.conversations.filter(c=>{const cu = findCustomer(c.customerId);return cu && (cu.name.toLowerCase().includes(q)||cu.en.toLowerCase().includes(q)||c.subject.toLowerCase().includes(q));}).slice(0,4);
    const hitTickets= Store.tickets.filter(t=>t.id.toLowerCase().includes(q)||t.title.toLowerCase().includes(q)).slice(0,4);
    const hitKB     = Store.knowledge.filter(k=>k.title.toLowerCase().includes(q)||k.cat.toLowerCase().includes(q)).slice(0,4);
    let html = '';
    const sec = (lbl,ico,items,fn)=>items.length?`<div class="sp-section">${ico} ${lbl} (${items.length})</div>`+items.map(fn).join(''):'';
    html += sec('客户','👤',hitCustomers,c=>`<div class="sp-item" onclick="openCustomer('${c.id}');closeSearch()"><div class="sp-ico avatar ${c.av}" style="width:28px;height:28px;font-size:11px">${c.avatar}</div><div><b>${c.name}</b><br><small>${c.tier} · ${findChannel(c.channel).name} · ${c.phone}</small></div></div>`);
    html += sec('客服','🎧',hitAgents,a=>`<div class="sp-item" onclick="openAgent('${a.id}');closeSearch()"><div class="sp-ico avatar ${a.av}" style="width:28px;height:28px;font-size:11px">${a.avatar}</div><div><b>${a.name}</b><br><small>${a.team} · ${a.role}</small></div></div>`);
    html += sec('对话','💬',hitConvs,c=>{const cu=findCustomer(c.customerId); const ch=findChannel(c.channelId); return `<div class="sp-item" onclick="route('workbench');setTimeout(()=>openConv('${c.id}'),200);closeSearch()"><div class="sp-ico">${ch.icon}</div><div><b>${cu.name}</b> - ${c.subject}<br><small>${c.lastMsg.slice(0,50)}</small></div></div>`;});
    html += sec('工单','🎫',hitTickets,t=>`<div class="sp-item" onclick="openTicket('${t.id}');closeSearch()"><div class="sp-ico">🎫</div><div><b>${t.id}</b> ${t.title}<br><small>${t.category} · ${t.status}</small></div></div>`);
    html += sec('知识','📚',hitKB,k=>`<div class="sp-item" onclick="openKnowledge('${k.id}');closeSearch()"><div class="sp-ico">📚</div><div><b>${k.title}</b><br><small>${k.cat} · ${k.views}次查看</small></div></div>`);
    if(!html) html = '<div class="sp-empty">未找到匹配项</div>';
    pop.innerHTML = html;
    pop.classList.add('show');
  });
  inp.addEventListener('blur',()=>setTimeout(()=>pop.classList.remove('show'),200));
  inp.addEventListener('focus',()=>{ if(inp.value.trim()) pop.classList.add('show'); });
  document.addEventListener('keydown',(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){ e.preventDefault(); inp.focus(); inp.select(); } });
}
function closeSearch(){ const p=document.getElementById('searchPop'); if(p)p.classList.remove('show'); const i=document.getElementById('globalSearch'); if(i)i.value=''; }

/* ===================== App 启动入口 ===================== */
function bootApp(){
  try {
    hydrateStore();
    ensureKnowledgeBaseIntegrity();
    ensureCustomerAutomationIntegrity();
    document.querySelectorAll('.nav-item').forEach(n=>{
      n.addEventListener('click',(e)=>{ e.preventDefault(); const r = n.dataset.r; if(r) route(r); });
    });
    setupGlobalSearch();
    updateBadges();
    const initial = (location.hash||'#/dashboard').replace('#/','');
    route(initial);
    console.log('[App] 已启动 · 9 个一级路由就绪');
  } catch(e){
    console.error('[App] 启动失败:', e);
    const pg = document.getElementById('page');
    if(pg) pg.innerHTML = '<div class="card" style="margin:20px;padding:20px;border-left:4px solid #ef4444"><h2>⚠️ 启动错误</h2><p>'+e.message+'</p><pre style="white-space:pre-wrap;background:#fafbff;padding:10px;border-radius:6px;font-size:11px;overflow:auto">'+(e.stack||'').replace(/</g,'&lt;')+'</pre></div>';
  }
}
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', bootApp); } else { bootApp(); }
